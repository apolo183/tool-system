    owner: tool-system
    lifecycle: *active
    status: *registered
    single_responsibility: load and validate task manifests, change plans, alignment gates, and repository write policy
    blueprint_objective_ref: *product_objective
    natural_owner_paths:
      - src/tool_system/manifest/*.py
      - src/tool_system/gate/*
      - src/tool_system/policy/*.py
      - src/tool_system/cli/validate_task_manifest.py
      - src/tool_system/cli/validate_change_plan.py
      - src/tool_system/cli/validate_alignment_gate.py
    public_interface_version: *interface_version
    input_contract: [task_manifest_and_change_plan_yaml]
    output_contract: [validation_decision_and_reasons]
    error_semantics: [invalid_or_missing_input_blocks]
    externally_visible_side_effects: [bounded_local_command_execution_only_when_explicitly_invoked]
    code_boundary: [manifest_gate_and_policy_packages]
    data_boundary: [caller_supplied_yaml_and_policy_documents]
    test_boundary: [manifest_gate_and_policy_tests]
    runtime_artifact_boundary: [validation_and_command_results]
    cleanup_boundary: [command_outputs_are_creator_owned]
    upstream_dependency_module_ids_and_versions: []
    downstream_dependency_module_ids_and_versions:
      - module_id: architecture_registry
        module_version: *module_version
        public_interface_version: *interface_version
      - module_id: repository_controller
        module_version: *module_version
        public_interface_version: *interface_version
      - module_id: process_authority
        module_version: 2.0.0
        public_interface_version: "2"
      - module_id: task_planner
        module_version: 1.1.0
        public_interface_version: *interface_version
      - module_id: task_runner
        module_version: 1.1.0
        public_interface_version: *interface_version
      - module_id: role_runtime
        module_version: 1.1.0
        public_interface_version: *interface_version
      - module_id: target_repo_adapter
        module_version: *module_version
        public_interface_version: *interface_version
      - module_id: cleanup_planner
        module_version: *module_version
        public_interface_version: *interface_version
      - module_id: cli_frontend
        module_version: 1.1.0
        public_interface_version: *interface_version
    content_hashes_and_expected_preconditions: *common_preconditions
    authorization_envelope: *local_authority
    acceptance_evidence: [manifest_gate_and_policy_test_suites]
    rollback_evidence: *rollback_evidence
    replacement_evidence: *replacement_evidence

