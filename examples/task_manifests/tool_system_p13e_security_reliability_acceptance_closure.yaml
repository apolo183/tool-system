  - src/**
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_alignment_gate examples/active_gates.yaml
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p13e_security_reliability_acceptance_closure.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - full tests return PASS_264
    - public contracts agree P13 is accepted and closed
    - P14 phase entry remains false
    - active gates return PASS
    - named local P13 temporary resources are removed by their creator
rollback:
  method: git_revert
  reference: p13e-security-reliability-acceptance-closure
approval:
  required: true
  approved_by: user_explicit_p13_full_lifecycle_authorization
