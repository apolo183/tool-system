  - repo: apolo183/tool-system
    path: src/tool_system/agent_worker/process_runtime.py
    ref: 76ae268bb703aec32be15a6214a0edc83c23e390
    why_relevant: Final P13 accepted process-worker natural owner.
  - repo: apolo183/tool-system
    path: src/tool_system/orchestrator/durable.py
    ref: 76ae268bb703aec32be15a6214a0edc83c23e390
    why_relevant: Final P13 accepted durable-orchestrator natural owner.
allowed_files:
  - blueprint/tool_system_v0.yaml
  - AGENTS.md
  - README.md
  - tests/test_phase_alignment.py
  - docs/reports/p13e_security_reliability_acceptance_closure.md
  - examples/task_manifests/tool_system_p13e_security_reliability_acceptance_closure.yaml
  - examples/change_plans/tool_system_p13e_security_reliability_acceptance_closure.yaml
  - examples/active_gates.yaml
