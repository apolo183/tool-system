task_id: tool-system-adapter-policy-gate
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p9c-adapter-policy-gate
phase: P9_WORKER_ADAPTER_ORCHESTRATION
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P9_WORKER_ADAPTER_ORCHESTRATION
scope:
  summary: Add adapter policy gate for no-mutation adapter orchestration records.
  in_scope:
    - src/tool_system/worker_adapter/__init__.py
    - src/tool_system/worker_adapter/policy_gate.py
    - tests/test_worker_adapter_policy_gate.py
    - docs/reports/p9c_adapter_policy_gate_record.md
    - examples/task_manifests/tool_system_adapter_policy_gate.yaml
    - examples/change_plans/tool_system_adapter_policy_gate.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - external worker calls
    - downstream write execution
    - production activity
    - business-domain logic
evidence:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: P9 owns adapter policy gate output.
  - repo: apolo183/tool-system
    path: src/tool_system/worker_adapter/orchestration.py
    why_relevant: Policy gate consumes adapter orchestration records.
  - repo: apolo183/tool-system
    path: docs/reports/p9_phase_entry_record.md
    why_relevant: Records P9 boundaries and prohibitions.
allowed_files:
  - src/tool_system/worker_adapter/__init__.py
  - src/tool_system/worker_adapter/policy_gate.py
  - tests/test_worker_adapter_policy_gate.py
  - docs/reports/p9c_adapter_policy_gate_record.md
  - examples/task_manifests/tool_system_adapter_policy_gate.yaml
  - examples/change_plans/tool_system_adapter_policy_gate.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q tests/test_worker_adapter_policy_gate.py tests/test_worker_adapter_orchestration.py tests/test_worker_adapter_contract.py
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_adapter_policy_gate.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - focused pytest exits 0
    - adapter policy gate change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p9c-adapter-policy-gate
approval:
  required: true
  approved_by: user_auto_iterate_until_milestone
