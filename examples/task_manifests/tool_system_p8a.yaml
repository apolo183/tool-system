task_id: tool-system-p8a
task_type: contract_update
target_repo: apolo183/tool-system
target_branch: p8a-runtime-entry
phase: P8_MULTI_AGENT_RUNTIME
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P8_MULTI_AGENT_RUNTIME
scope:
  summary: Enter P8 runtime phase after P7 task graph closeout candidate.
  in_scope:
    - AGENTS.md
    - README.md
    - blueprint/tool_system_v0.yaml
    - tests/test_phase_alignment.py
    - examples/task_manifests/tool_system_p8a.yaml
    - examples/change_plans/tool_system_p8a.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - business-domain logic
    - target repository mutation
    - production deployment
    - cleanup execution
evidence:
  - repo: apolo183/tool-system
    path: docs/tool_system_global_development_principles_v1.md
    why_relevant: Global principles define evidence, drift, authorization, claims, and rollback boundaries for phase entry.
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: Blueprint owns phase and milestone contracts.
allowed_files:
  - AGENTS.md
  - README.md
  - blueprint/tool_system_v0.yaml
  - tests/test_phase_alignment.py
  - examples/task_manifests/tool_system_p8a.yaml
  - examples/change_plans/tool_system_p8a.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
