task_id: tool-system-graph-run
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p7b-task-graph-runner
phase: P7_BLUEPRINT_TO_TASK_GRAPH
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P7_BLUEPRINT_TO_TASK_GRAPH
scope:
  summary: Run validated task graphs through compiled batch runner execution.
  in_scope:
    - pyproject.toml
    - src/tool_system/runner/task_graph_runner.py
    - src/tool_system/cli/run_task_graph.py
    - src/tool_system/cli/main.py
    - tests/test_task_graph_runner.py
    - examples/task_manifests/tool_system_graph_run.yaml
    - examples/change_plans/tool_system_graph_run.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - business-domain logic
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: src/tool_system/planner/task_graph.py
    why_relevant: Existing task graph planner compiles graphs into ordered batches.
  - repo: apolo183/tool-system
    path: src/tool_system/runner/task_runner.py
    why_relevant: Existing batch runner executes compiled batch definitions.
allowed_files:
  - pyproject.toml
  - src/tool_system/runner/task_graph_runner.py
  - src/tool_system/cli/run_task_graph.py
  - src/tool_system/cli/main.py
  - tests/test_task_graph_runner.py
  - examples/task_manifests/tool_system_graph_run.yaml
  - examples/change_plans/tool_system_graph_run.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
