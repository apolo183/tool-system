task_id: tool-system-task-graph-planner
task_type: code_add
target_repo: apolo183/tool-system
target_branch: task-graph
phase: P7_BLUEPRINT_TO_TASK_GRAPH
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P7_BLUEPRINT_TO_TASK_GRAPH
scope:
  summary: Add the first P7 task graph planner with dependency ordering and role coverage checks.
  in_scope:
    - AGENTS.md
    - README.md
    - blueprint/tool_system_v0.yaml
    - pyproject.toml
    - src/tool_system/planner/task_graph.py
    - src/tool_system/cli/plan_task_graph.py
    - tests/test_task_graph.py
    - tests/test_phase_alignment.py
    - examples/task_graphs/tool_system_p7a_task_graph.yaml
    - examples/task_manifests/tool_system_task_graph_planner.yaml
    - examples/change_plans/tool_system_task_graph_planner.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - business-domain logic
    - target repository mutation
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: Blueprint contains role taxonomy and P7 milestone contract.
  - repo: apolo183/tool-system
    path: src/tool_system/runner/task_runner.py
    why_relevant: P7 task graph planning prepares grouped runner execution from bounded tasks.
allowed_files:
  - AGENTS.md
  - README.md
  - blueprint/tool_system_v0.yaml
  - pyproject.toml
  - src/tool_system/planner/task_graph.py
  - src/tool_system/cli/plan_task_graph.py
  - tests/test_task_graph.py
  - tests/test_phase_alignment.py
  - examples/task_graphs/tool_system_p7a_task_graph.yaml
  - examples/task_manifests/tool_system_task_graph_planner.yaml
  - examples/change_plans/tool_system_task_graph_planner.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: apolo183
  approval_source: chat_user_message:continue_next_step_p7
