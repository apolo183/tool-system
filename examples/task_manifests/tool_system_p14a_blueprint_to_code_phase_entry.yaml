task_id: tool-system-p14a-blueprint-to-code-phase-entry
task_type: docs_update
target_repo: apolo183/tool-system
target_branch: p14a-blueprint-to-code-phase-entry
phase: P14_BLUEPRINT_TO_CODE_AUTONOMOUS_DEVELOPMENT
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P14_BLUEPRINT_TO_CODE_AUTONOMOUS_DEVELOPMENT
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: product_objective
alignment:
  parent:
    document: docs/reports/p14r_blueprint_product_objective_roadmap_reconciliation.md
    section_or_key: Stop condition
    scope: Enter only the revised P14A specification stage after P14R closure.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: product_objective
    scope: Lock the end-to-end contract for bounded blueprint-driven autonomous software development.
scope:
  summary: Enter P14 and specify its evidence-backed blueprint-to-code contract without starting implementation.
  in_scope:
    - blueprint/tool_system_v0.yaml
    - README.md
    - AGENTS.md
    - tests/test_phase_alignment.py
    - tests/test_product_objective_alignment.py
    - tests/test_p14_phase_entry_contract.py
    - docs/reports/p14a_blueprint_to_code_phase_entry_and_contract.md
    - examples/task_manifests/tool_system_p14a_blueprint_to_code_phase_entry.yaml
    - examples/change_plans/tool_system_p14a_blueprint_to_code_phase_entry.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - policy or runtime source changes
    - P14B or later implementation
    - model/provider network calls or credentials
    - finance-us or any target-repository mutation
    - branch cleanup or deletion
    - P15-P16 entry or production deployment
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p14r_blueprint_product_objective_roadmap_reconciliation.md
    ref: 2d3dd10e622959a1cb5d124e58b1ba0b53b9ca51
    why_relevant: Merged global product objective and authorization boundary for P14A.
  - repo: apolo183/tool-system
    path: src/tool_system/planner/requirement_graph.py
    ref: 2d3dd10e622959a1cb5d124e58b1ba0b53b9ca51
    why_relevant: Current compiler requires caller-prepared work items and manifests.
  - repo: apolo183/tool-system
    path: src/tool_system/agent_worker/interface.py
    ref: 2d3dd10e622959a1cb5d124e58b1ba0b53b9ca51
    why_relevant: Default worker remains record-only and no-mutation.
  - repo: apolo183/tool-system
    path: src/tool_system/worker_adapter/contract.py
    ref: 2d3dd10e622959a1cb5d124e58b1ba0b53b9ca51
    why_relevant: Current default adapter blocks external-worker execution.
allowed_files:
  - blueprint/tool_system_v0.yaml
  - README.md
  - AGENTS.md
  - tests/test_phase_alignment.py
  - tests/test_product_objective_alignment.py
  - tests/test_p14_phase_entry_contract.py
  - docs/reports/p14a_blueprint_to_code_phase_entry_and_contract.md
  - examples/task_manifests/tool_system_p14a_blueprint_to_code_phase_entry.yaml
  - examples/change_plans/tool_system_p14a_blueprint_to_code_phase_entry.yaml
  - examples/active_gates.yaml
forbidden_files:
  - policy/**
  - src/**
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q tests/test_phase_alignment.py tests/test_product_objective_alignment.py tests/test_p14_phase_entry_contract.py
    - python -m pytest -q
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p14a_blueprint_to_code_phase_entry.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - capability gaps and P14A-P14I stage dependencies are machine checked
    - public contracts agree P14 is active at specification-only scope
    - P14B implementation and live provider execution remain false
    - full tests and active gates pass
    - no source, provider, target, cleanup, P15-P16, or production action occurs
rollback:
  method: git_revert
  reference: p14a-blueprint-to-code-phase-entry
approval:
  required: true
  approved_by: user_authorized_next_step_p14_phase_entry
