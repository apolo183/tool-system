task_id: tool-system-p7a-dag-planner
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p7a-dag-planner
phase: P7_BLUEPRINT_TO_DAG_PLANNER
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P7_BLUEPRINT_TO_DAG_PLANNER
scope:
  summary: Add deterministic blueprint milestone to DAG planner foundation.
  in_scope:
    - AGENTS.md
    - README.md
    - blueprint/tool_system_v0.yaml
    - pyproject.toml
    - src/tool_system/planner/dag_planner.py
    - src/tool_system/cli/dag_plan.py
    - tests/test_dag_planner.py
    - tests/test_phase_alignment.py
    - examples/task_manifests/tool_system_p7a_dag_planner.yaml
    - examples/change_plans/tool_system_p7a_dag_planner.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - business-domain logic
    - target repository mutation
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: Blueprint owns milestone definitions and role taxonomy for DAG planning.
  - repo: apolo183/tool-system
    path: src/tool_system/runner/task_runner.py
    why_relevant: P7 DAG outputs are later consumed by P6 runner flows.
allowed_files:
  - AGENTS.md
  - README.md
  - blueprint/tool_system_v0.yaml
  - pyproject.toml
  - src/tool_system/planner/dag_planner.py
  - src/tool_system/cli/dag_plan.py
  - tests/test_dag_planner.py
  - tests/test_phase_alignment.py
  - examples/task_manifests/tool_system_p7a_dag_planner.yaml
  - examples/change_plans/tool_system_p7a_dag_planner.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
