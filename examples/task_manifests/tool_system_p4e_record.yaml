task_id: tool-system-p4e-record
task_type: code_add
target_repo: apolo183/tool-system
target_branch: iter19
phase: P4_TARGET_REPO_DRY_RUN_ADAPTER
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P4_TARGET_REPO_DRY_RUN_ADAPTER
scope:
  summary: Add no-write target repository write intent audit record.
  in_scope:
    - src/tool_system/target_repo/p4e_record.py
    - tests/test_write_intent.py
    - examples/task_manifests/tool_system_p4e_record.yaml
    - examples/change_plans/tool_system_p4e_record.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - finance-os writes
    - finance-os implementation changes
    - business-domain logic
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: src/tool_system/target_repo/p4d_precheck.py
    why_relevant: P4E intent records depend on the P4D precheck result.
allowed_files:
  - src/tool_system/target_repo/p4e_record.py
  - tests/test_write_intent.py
  - examples/task_manifests/tool_system_p4e_record.yaml
  - examples/change_plans/tool_system_p4e_record.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
  - finance-os/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
