task_id: tool-system-p10b1-target-repo-identity-correction
task_type: docs_add
target_repo: apolo183/tool-system
target_branch: p10b1-target-repo-identity-correction
phase: P10_CONTROLLED_TARGET_REPO_PR_PILOT
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
alignment:
  parent:
    document: docs/reports/p10b_target_repo_candidate_selection.md
    section_or_key: Selection decision
    scope: Corrects the canonical-name versus GitHub-slug inference while preserving the original read-only evidence trail.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
    scope: Performs read-only candidate identity correction and selection inside the controlled target-repo PR pilot boundary.
scope:
  summary: Add an append-only P10B1 correction record and select finance-cn for read-only P10C packet preparation.
  in_scope:
    - docs/reports/p10b1_target_repo_identity_correction.md
    - examples/task_manifests/tool_system_p10b1_target_repo_identity_correction.yaml
    - examples/change_plans/tool_system_p10b1_target_repo_identity_correction.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - downstream target-repository branch creation
    - downstream target-repository file write
    - downstream target-repository PR creation
    - execution approval
    - production deployment
    - business-domain implementation
    - real external worker calls
    - rollback execution
    - cleanup execution
    - Codex replacement claims
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p10b_target_repo_candidate_selection.md
    why_relevant: Parent record containing the superseded access-blocked inference.
  - repo: apolo183/tool-system
    path: docs/reports/p10a_phase_entry_target_repo_pr_pilot_gate_foundation.md
    why_relevant: Defines the read-only P10 candidate-selection gate.
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: Active P10 milestone and downstream-write boundary.
  - repo: apolo183/finance-app
    path: AGENTS.md
    why_relevant: Active governance entrypoint for the canonical finance-cn project.
  - repo: apolo183/finance-app
    path: REPO_MANIFEST.md
    why_relevant: Active formal-file registry for the canonical finance-cn project.
allowed_files:
  - docs/reports/p10b1_target_repo_identity_correction.md
  - examples/task_manifests/tool_system_p10b1_target_repo_identity_correction.yaml
  - examples/change_plans/tool_system_p10b1_target_repo_identity_correction.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
  - src/**
write_mode: pull_request
verification:
  commands:
    - python -m tool_system.cli.validate_alignment_gate examples/active_gates.yaml
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p10b1_target_repo_identity_correction.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - alignment gate validation returns PASS
    - P10B1 change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p10b1-target-repo-identity-correction
approval:
  required: true
  approved_by: user_auto_iterate_short_stage_until_major_milestone
