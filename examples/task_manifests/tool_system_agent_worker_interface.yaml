task_id: tool-system-agent-worker-interface
 task_type: code_add
target_repo: apolo183/tool-system
target_branch: p8c-agent-worker-interface
phase: P8_MULTI_AGENT_RUNTIME
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: boundaries.owns.agent_worker_interface
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P8_MULTI_AGENT_RUNTIME
scope:
  summary: Add a no-mutation agent worker interface and connect role runtime records to it.
  in_scope:
    - src/tool_system/agent_worker/__init__.py
    - src/tool_system/agent_worker/interface.py
    - src/tool_system/runtime/role_runtime.py
    - tests/test_agent_worker_interface.py
    - examples/task_manifests/tool_system_agent_worker_interface.yaml
    - examples/change_plans/tool_system_agent_worker_interface.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - external model API calls
    - Codex replacement claims
    - business-domain logic
    - target repository mutation
    - production deployment
    - cleanup execution
evidence:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: P8 owns agent_worker_interface and no-mutation multi-agent runtime outputs.
  - repo: apolo183/tool-system
    path: src/tool_system/runtime/role_runtime.py
    why_relevant: Role runtime is the natural owner for role execution records.
  - repo: apolo183/tool-system
    path: docs/tool_system_global_development_principles_v1.md
    why_relevant: Claims boundary forbids Codex replacement and autonomous target-repo execution claims without evidence.
allowed_files:
  - src/tool_system/agent_worker/__init__.py
  - src/tool_system/agent_worker/interface.py
  - src/tool_system/runtime/role_runtime.py
  - tests/test_agent_worker_interface.py
  - examples/task_manifests/tool_system_agent_worker_interface.yaml
  - examples/change_plans/tool_system_agent_worker_interface.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q tests/test_agent_worker_interface.py tests/test_role_runtime.py
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_agent_worker_interface.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - focused pytest exits 0
    - agent worker change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p8c-agent-worker-interface
approval:
  required: true
  approved_by: user_continue_automatic_development_request
