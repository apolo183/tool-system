task_id: tool-system-p10e-finance-us-target-local-validation-evidence
task_type: docs_add
target_repo: apolo183/tool-system
target_branch: p10e-finance-us-target-local-validation-evidence
phase: P10_CONTROLLED_TARGET_REPO_PR_PILOT
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
alignment:
  parent:
    document: docs/reports/p10d_finance_us_pr_execution_evidence.md
    section_or_key: Validation state
    scope: Close the pending target-local validation item without changing the target repository.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
    scope: Record post-pilot validation evidence and preserve target PR boundaries.
scope:
  summary: Record finance-us PR 1 target-local validation PASS.
  in_scope:
    - docs/reports/p10e_finance_us_target_local_validation_evidence.md
    - examples/task_manifests/tool_system_p10e_finance_us_target_local_validation_evidence.yaml
    - examples/change_plans/tool_system_p10e_finance_us_target_local_validation_evidence.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - finance-us mutation
    - target PR ready transition
    - target PR merge
    - P1A acceptance
    - P1B entry
    - data or model execution
    - rollback or cleanup execution
allowed_files:
  - docs/reports/p10e_finance_us_target_local_validation_evidence.md
  - examples/task_manifests/tool_system_p10e_finance_us_target_local_validation_evidence.yaml
  - examples/change_plans/tool_system_p10e_finance_us_target_local_validation_evidence.yaml
  - examples/active_gates.yaml
forbidden_files:
  - src/**
  - tests/**
  - finance/**
  - trading/**
write_mode: pull_request
verification:
  commands:
    - python -m tool_system.cli.validate_alignment_gate examples/active_gates.yaml
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p10e_finance_us_target_local_validation_evidence.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - alignment gate validation returns PASS
    - P10E change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p10e-finance-us-target-local-validation-evidence
approval:
  required: false
  basis: user supplied target-local validation evidence
