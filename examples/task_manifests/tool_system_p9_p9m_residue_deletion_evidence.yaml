task_id: tool-system-p9-p9m-residue-deletion-evidence
task_type: docs_add
target_repo: apolo183/tool-system
target_branch: p9s-p9m-deletion-evidence
phase: P9_WORKER_ADAPTER_ORCHESTRATION
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P9_WORKER_ADAPTER_ORCHESTRATION
alignment:
  parent:
    document: docs/reports/p9r_p9m_residue_deletion_gate.md
    section_or_key: Deletion eligibility
    scope: Records execution outcome for the local deletion gate defined by P9R without expanding cleanup scope.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P9_WORKER_ADAPTER_ORCHESTRATION
    scope: Stays within P9 governance, cleanup evidence, and no-mutation boundaries.
scope:
  summary: Add evidence record for user-executed deletion of the superseded p9m branch residue.
  in_scope:
    - docs/reports/p9s_p9m_residue_deletion_evidence.md
    - examples/task_manifests/tool_system_p9_p9m_residue_deletion_evidence.yaml
    - examples/change_plans/tool_system_p9_p9m_residue_deletion_evidence.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - branch deletion by this PR
    - additional cleanup execution
    - source behavior changes
    - P9 acceptance
    - P9 closure
    - P10 approval
    - rollback execution
    - external worker calls
    - downstream write execution
    - production activity
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p9r_p9m_residue_deletion_gate.md
    why_relevant: Parent deletion gate defining final local checks and deletion/post-verification commands.
  - repo: apolo183/tool-system
    path: docs/reports/p9q_p9m_unique_residue_disposition.md
    why_relevant: Disposition classifying p9m-blueprint-alignment-gate as superseded duplicate residue.
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: Active blueprint defining P9 governance and no-mutation boundaries.
allowed_files:
  - docs/reports/p9s_p9m_residue_deletion_evidence.md
  - examples/task_manifests/tool_system_p9_p9m_residue_deletion_evidence.yaml
  - examples/change_plans/tool_system_p9_p9m_residue_deletion_evidence.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m tool_system.cli.validate_alignment_gate examples/active_gates.yaml
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p9_p9m_residue_deletion_evidence.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - alignment gate validation returns PASS
    - P9S change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p9s-p9m-deletion-evidence
approval:
  required: true
  approved_by: user_auto_iterate_short_stage_until_major_milestone
