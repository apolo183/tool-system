task_id: tool-system-adapter-orchestration-audit
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p9b-adapter-orchestration-audit
phase: P9_WORKER_ADAPTER_ORCHESTRATION
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P9_WORKER_ADAPTER_ORCHESTRATION
scope:
  summary: Add no-mutation adapter orchestration audit record and rollback reference bundle.
  in_scope:
    - src/tool_system/worker_adapter/__init__.py
    - src/tool_system/worker_adapter/orchestration.py
    - tests/test_worker_adapter_orchestration.py
    - docs/reports/p9b_adapter_orchestration_audit_record.md
    - examples/task_manifests/tool_system_adapter_orchestration_audit.yaml
    - examples/change_plans/tool_system_adapter_orchestration_audit.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - external worker calls
    - downstream write execution
    - production activity
    - business-domain logic
evidence:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: P9 owns orchestration audit and rollback outputs.
  - repo: apolo183/tool-system
    path: src/tool_system/worker_adapter/contract.py
    why_relevant: Adapter orchestration consumes adapter requests and dry-run adapter results.
  - repo: apolo183/tool-system
    path: docs/reports/p9_phase_entry_record.md
    why_relevant: Records P9 boundaries and prohibitions.
allowed_files:
  - src/tool_system/worker_adapter/__init__.py
  - src/tool_system/worker_adapter/orchestration.py
  - tests/test_worker_adapter_orchestration.py
  - docs/reports/p9b_adapter_orchestration_audit_record.md
  - examples/task_manifests/tool_system_adapter_orchestration_audit.yaml
  - examples/change_plans/tool_system_adapter_orchestration_audit.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q tests/test_worker_adapter_orchestration.py tests/test_worker_adapter_contract.py
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_adapter_orchestration_audit.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - focused pytest exits 0
    - adapter orchestration change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p9b-adapter-orchestration-audit
approval:
  required: true
  approved_by: user_auto_iterate_until_milestone
