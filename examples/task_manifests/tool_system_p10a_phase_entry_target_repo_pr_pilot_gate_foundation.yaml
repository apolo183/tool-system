task_id: tool-system-p10a-phase-entry-target-repo-pr-pilot-gate-foundation
task_type: docs_add
target_repo: apolo183/tool-system
target_branch: p10a-phase-entry-target-repo-pr-pilot
phase: P10_CONTROLLED_TARGET_REPO_PR_PILOT
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
alignment:
  parent:
    document: docs/reports/p9u_p9_acceptance_p10_boundary.md
    section_or_key: Approved P10 boundary
    scope: Implements the approved P10 boundary by creating a phase-entry gate foundation only.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
    scope: Stays within controlled target-repository PR pilot planning and approval-gate boundaries.
scope:
  summary: Add P10A phase-entry and target-repo PR pilot gate-foundation documentation.
  in_scope:
    - docs/reports/p10a_phase_entry_target_repo_pr_pilot_gate_foundation.md
    - examples/task_manifests/tool_system_p10a_phase_entry_target_repo_pr_pilot_gate_foundation.yaml
    - examples/change_plans/tool_system_p10a_phase_entry_target_repo_pr_pilot_gate_foundation.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - target repository selection
    - downstream target-repository branch creation
    - downstream target-repository file write
    - downstream target-repository PR creation
    - production deployment
    - business-domain implementation
    - real external worker calls
    - rollback execution
    - cleanup execution
    - Codex replacement claims
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p9u_p9_acceptance_p10_boundary.md
    why_relevant: Parent record accepting P9 and approving the P10 controlled target-repo PR pilot boundary.
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: Active blueprint defining the P10 milestone objective and entry requirements.
  - repo: apolo183/tool-system
    path: examples/active_gates.yaml
    why_relevant: Active gate index that must register the P10A manifest and change plan.
allowed_files:
  - docs/reports/p10a_phase_entry_target_repo_pr_pilot_gate_foundation.md
  - examples/task_manifests/tool_system_p10a_phase_entry_target_repo_pr_pilot_gate_foundation.yaml
  - examples/change_plans/tool_system_p10a_phase_entry_target_repo_pr_pilot_gate_foundation.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
  - src/**
write_mode: pull_request
verification:
  commands:
    - python -m tool_system.cli.validate_alignment_gate examples/active_gates.yaml
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p10a_phase_entry_target_repo_pr_pilot_gate_foundation.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - alignment gate validation returns PASS
    - P10A change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p10a-phase-entry-target-repo-pr-pilot
approval:
  required: true
  approved_by: user_auto_iterate_short_stage_until_major_milestone
