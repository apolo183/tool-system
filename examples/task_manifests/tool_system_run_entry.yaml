task_id: tool-system-run-entry
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p6-runner-productization
phase: P6_RUNNER_PRODUCTIZATION
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P6_RUNNER_PRODUCTIZATION
scope:
  summary: Add unified local task runner CLI for manifest and change-plan gate execution.
  in_scope:
    - src/tool_system/runner/task_runner.py
    - src/tool_system/cli/run_task.py
    - tests/test_task_runner.py
    - examples/task_manifests/tool_system_run_entry.yaml
    - examples/change_plans/tool_system_run_entry.yaml
    - examples/active_gates.yaml
    - pyproject.toml
    - AGENTS.md
    - blueprint/tool_system_v0.yaml
  out_of_scope:
    - business-domain logic
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: src/tool_system/cli/execute_change_plan.py
    why_relevant: Existing CLI runs change-plan commands and emits gate decisions.
  - repo: apolo183/tool-system
    path: src/tool_system/repo_controller/controller.py
    why_relevant: Runner must preserve repo-write decision boundaries.
allowed_files:
  - src/tool_system/runner/task_runner.py
  - src/tool_system/cli/run_task.py
  - tests/test_task_runner.py
  - examples/task_manifests/tool_system_run_entry.yaml
  - examples/change_plans/tool_system_run_entry.yaml
  - examples/active_gates.yaml
  - pyproject.toml
  - AGENTS.md
  - blueprint/tool_system_v0.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: apolo183
  approval_source: chat_user_message:p6_low_requirement_runner_productization
