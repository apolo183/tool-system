task_id: tool-system-p3c-live-collector
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p3c-live-collector
phase: P3_REPO_WRITE_CONTROLLER
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P3_REPO_WRITE_CONTROLLER
scope:
  summary: Add live GitHub collector from PR number to repo write decision inputs.
  in_scope:
    - src/tool_system/repo_controller/live_github_collector.py
    - examples/gate_decisions/pass.yaml
    - examples/task_manifests/tool_system_p3c_live_collector.yaml
    - examples/change_plans/tool_system_p3c_live_collector.yaml
    - tests/test_live_github_collector.py
    - AGENTS.md
  out_of_scope:
    - finance-os changes
    - business-domain logic
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    line_range: P3_REPO_WRITE_CONTROLLER
    why_relevant: Defines P3 repo write controller objective and outputs.
  - repo: apolo183/tool-system
    path: AGENTS.md
    line_range: Current phase
    why_relevant: Current phase drift required correction from P1 to P3.
allowed_files:
  - src/tool_system/repo_controller/live_github_collector.py
  - examples/gate_decisions/pass.yaml
  - examples/task_manifests/tool_system_p3c_live_collector.yaml
  - examples/change_plans/tool_system_p3c_live_collector.yaml
  - tests/test_live_github_collector.py
  - AGENTS.md
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p3c_live_collector.yaml
  pass_conditions:
    - pytest exits 0
    - P3C change plan validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
