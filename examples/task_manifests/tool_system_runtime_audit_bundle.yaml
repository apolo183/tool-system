task_id: tool-system-runtime-audit-bundle
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p8d-runtime-audit-bundle
phase: P8_MULTI_AGENT_RUNTIME
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P8_MULTI_AGENT_RUNTIME.outputs.runtime_audit_bundle
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P8_MULTI_AGENT_RUNTIME.outputs.rollback_reference_bundle
scope:
  summary: Add no-mutation runtime audit and rollback bundle records for role runtime plans.
  in_scope:
    - src/tool_system/runtime/audit_bundle.py
    - tests/test_runtime_audit_bundle.py
    - examples/task_manifests/tool_system_runtime_audit_bundle.yaml
    - examples/change_plans/tool_system_runtime_audit_bundle.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - external model API calls
    - Codex replacement claims
    - business-domain logic
    - target repository mutation
    - production deployment
    - cleanup execution
    - milestone closeout
    - role transition execution
evidence:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: P8 requires runtime audit bundle and rollback reference bundle outputs.
  - repo: apolo183/tool-system
    path: src/tool_system/runtime/role_runtime.py
    why_relevant: Runtime audit bundles consume role runtime plans and worker result records.
  - repo: apolo183/tool-system
    path: src/tool_system/target_repo/p5i_bundle.py
    why_relevant: Existing no-write bundle pattern for audit and rollback records.
allowed_files:
  - src/tool_system/runtime/audit_bundle.py
  - tests/test_runtime_audit_bundle.py
  - examples/task_manifests/tool_system_runtime_audit_bundle.yaml
  - examples/change_plans/tool_system_runtime_audit_bundle.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q tests/test_runtime_audit_bundle.py tests/test_role_runtime.py tests/test_agent_worker_interface.py
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_runtime_audit_bundle.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - focused pytest exits 0
    - runtime audit bundle change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p8d-runtime-audit-bundle
approval:
  required: true
  approved_by: user_auto_advance_until_milestone_or_required_intervention
