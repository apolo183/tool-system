task_id: tool-system-stage
task_type: code_add
target_repo: apolo183/tool-system
target_branch: stage-runner
phase: P7_BLUEPRINT_TO_TASK_GRAPH
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P7_BLUEPRINT_TO_TASK_GRAPH
scope:
  summary: Run structured inputs through graph compilation and batch execution.
  in_scope:
    - pyproject.toml
    - src/tool_system/runner/stage_runner.py
    - src/tool_system/cli/run_stage.py
    - tests/test_stage_runner.py
    - examples/task_manifests/tool_system_stage.yaml
    - examples/change_plans/tool_system_stage.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - business-domain logic
    - target repository mutation
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: src/tool_system/planner/requirement_graph.py
    why_relevant: Structured input compiler prepares the graph consumed by this runner.
  - repo: apolo183/tool-system
    path: src/tool_system/runner/task_runner.py
    why_relevant: Stage runner delegates compiled batches to the existing batch runner.
allowed_files:
  - pyproject.toml
  - src/tool_system/runner/stage_runner.py
  - src/tool_system/cli/run_stage.py
  - tests/test_stage_runner.py
  - examples/task_manifests/tool_system_stage.yaml
  - examples/change_plans/tool_system_stage.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
