task_id: tool-system-p9-blueprint-alignment-control
task_type: docs_update
target_repo: apolo183/tool-system
target_branch: p9l-blueprint-alignment-control
phase: P9_WORKER_ADAPTER_ORCHESTRATION
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P9_WORKER_ADAPTER_ORCHESTRATION
scope:
  summary: Add parent-plus-global blueprint alignment invariant to project governance.
  in_scope:
    - AGENTS.md
    - docs/tool_system_global_development_principles_v1.md
    - docs/reports/p9l_blueprint_alignment_control_record.md
    - examples/task_manifests/tool_system_p9_blueprint_alignment_control.yaml
    - examples/change_plans/tool_system_p9_blueprint_alignment_control.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - source behavior changes
    - P9 acceptance
    - P9 closure
    - P10 approval
    - branch deletion
    - cleanup execution
    - destructive cleanup
    - rollback execution
    - external worker calls
    - downstream write execution
    - production activity
evidence:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: Active blueprint requiring P9 worker adapter orchestration and domain-agnostic boundaries.
  - repo: apolo183/tool-system
    path: docs/tool_system_global_development_principles_v1.md
    why_relevant: Project-wide governance contract to receive blueprint alignment invariant.
  - repo: apolo183/tool-system
    path: AGENTS.md
    why_relevant: Agent operating contract that must reflect the global governance rule.
allowed_files:
  - AGENTS.md
  - docs/tool_system_global_development_principles_v1.md
  - docs/reports/p9l_blueprint_alignment_control_record.md
  - examples/task_manifests/tool_system_p9_blueprint_alignment_control.yaml
  - examples/change_plans/tool_system_p9_blueprint_alignment_control.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p9_blueprint_alignment_control.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - P9 blueprint alignment control change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p9l-blueprint-alignment-control
approval:
  required: true
  approved_by: user_auto_iterate_short_stage_until_major_milestone
