task_id: tool-system-task-graph-batch
task_type: code_modify
target_repo: apolo183/tool-system
target_branch: graph-batch
phase: P7_BLUEPRINT_TO_TASK_GRAPH
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P7_BLUEPRINT_TO_TASK_GRAPH
scope:
  summary: Compile validated task graphs into ordered batch runner specs.
  in_scope:
    - src/tool_system/planner/task_graph.py
    - src/tool_system/cli/plan_task_graph.py
    - tests/test_task_graph.py
    - examples/task_manifests/tool_system_task_graph_batch.yaml
    - examples/change_plans/tool_system_graph_batch.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - business-domain logic
    - target repository mutation
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: src/tool_system/planner/task_graph.py
    why_relevant: Existing P7A task graph planner provides ordered execution plans.
  - repo: apolo183/tool-system
    path: src/tool_system/runner/task_runner.py
    why_relevant: Compiled batch specs are consumed by the P6 batch runner.
allowed_files:
  - src/tool_system/planner/task_graph.py
  - src/tool_system/cli/plan_task_graph.py
  - tests/test_task_graph.py
  - examples/task_manifests/tool_system_task_graph_batch.yaml
  - examples/change_plans/tool_system_graph_batch.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
