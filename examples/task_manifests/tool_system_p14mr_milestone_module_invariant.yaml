task_id: tool-system-p14mr-milestone-module-invariant
task_type: docs_update
target_repo: apolo183/tool-system
target_branch: p14mr-milestone-module-invariant
phase: P14_BLUEPRINT_TO_CODE_AUTONOMOUS_DEVELOPMENT
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: product_objective
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestone_module_invariant
alignment:
  parent:
    document: docs/reports/p14b_provider_neutral_ai_worker_contract.md
    section_or_key: Rollback and stop condition
    scope: Add the explicitly authorized governance invariant before P14C without reopening P14B.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: product_objective
    scope: Make blueprint-derived milestones replaceable modules while preserving bounded autonomous development and authority controls.
scope:
  summary: Establish the universal replaceable milestone-module invariant and machine-alignment baseline.
  in_scope:
    - AGENTS.md
    - README.md
    - blueprint/tool_system_v0.yaml
    - docs/tool_system_global_development_principles_v1.md
    - docs/reports/p14mr_milestone_module_invariant.md
    - examples/task_manifests/tool_system_p14mr_milestone_module_invariant.yaml
    - examples/change_plans/tool_system_p14mr_milestone_module_invariant.yaml
    - examples/active_gates.yaml
    - tests/test_milestone_module_invariant.py
    - tests/test_product_objective_alignment.py
    - tests/test_p14_phase_entry_contract.py
    - tests/test_phase_alignment.py
  out_of_scope:
    - runtime source or policy changes
    - automatic module replacement implementation
    - modification of existing external projects
    - P14C live provider, model, credential, network, or cost execution
    - finance-us or any target-repository mutation
    - branch cleanup, destructive deletion, rollback, or production deployment
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p14b_provider_neutral_ai_worker_contract.md
    ref: 212af8228b8879dc5332fc1d3fab2c401ba6a280
    why_relevant: Accepted P14B demonstrates a bounded capability module and preserves the P14C authorization boundary.
  - repo: apolo183/tool-system
    path: docs/tool_system_global_development_principles_v1.md
    ref: 212af8228b8879dc5332fc1d3fab2c401ba6a280
    why_relevant: Existing global rules contain partial ownership, alignment, replacement, and single-mainline controls but not the unified invariant.
allowed_files:
  - AGENTS.md
  - README.md
  - blueprint/tool_system_v0.yaml
  - docs/tool_system_global_development_principles_v1.md
  - docs/reports/p14mr_milestone_module_invariant.md
  - examples/task_manifests/tool_system_p14mr_milestone_module_invariant.yaml
  - examples/change_plans/tool_system_p14mr_milestone_module_invariant.yaml
  - examples/active_gates.yaml
  - tests/test_milestone_module_invariant.py
  - tests/test_product_objective_alignment.py
  - tests/test_p14_phase_entry_contract.py
  - tests/test_phase_alignment.py
forbidden_files:
  - src/**
  - policy/**
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - git diff --check
    - python -m pytest -q tests/test_milestone_module_invariant.py tests/test_product_objective_alignment.py tests/test_p14_phase_entry_contract.py tests/test_phase_alignment.py
    - python -m pytest -q
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p14mr_milestone_module_invariant.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - all project and milestone module fields, lifecycle, compatibility, invalidation, replacement, cleanup, and adoption gates are machine checked
    - global principles, AGENTS, README, blueprint, manifest, and stage sequence agree
    - full tests and active gates pass
    - no runtime, policy, provider, target repository, cleanup, rollback, or production action occurs
rollback:
  method: git_revert
  reference: p14mr-milestone-module-invariant
approval:
  required: true
  approved_by: user_authorized_global_milestone_module_invariant
