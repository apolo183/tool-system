task_id: tool-system-root-cli
task_type: code_add
target_repo: apolo183/tool-system
target_branch: cli-entry
phase: P6_RUNNER_PRODUCTIZATION
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P6_RUNNER_PRODUCTIZATION
scope:
  summary: Add root tool-system CLI with run and batch subcommands.
  in_scope:
    - src/tool_system/cli/main.py
    - tests/test_root_cli.py
    - examples/task_manifests/tool_system_root_cli.yaml
    - examples/change_plans/tool_system_root_cli.yaml
    - examples/active_gates.yaml
    - pyproject.toml
  out_of_scope:
    - business-domain logic
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: src/tool_system/cli/run_task.py
    why_relevant: Root run subcommand wraps existing task runner CLI behavior.
  - repo: apolo183/tool-system
    path: src/tool_system/cli/run_batch.py
    why_relevant: Root batch subcommand wraps existing grouped runner CLI behavior.
allowed_files:
  - src/tool_system/cli/main.py
  - tests/test_root_cli.py
  - examples/task_manifests/tool_system_root_cli.yaml
  - examples/change_plans/tool_system_root_cli.yaml
  - examples/active_gates.yaml
  - pyproject.toml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
