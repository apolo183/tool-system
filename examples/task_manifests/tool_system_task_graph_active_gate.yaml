task_id: tool-system-task-graph-active-gate
task_type: code_modify
target_repo: apolo183/tool-system
target_branch: requirement-graph
phase: P7_BLUEPRINT_TO_TASK_GRAPH
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P7_BLUEPRINT_TO_TASK_GRAPH
scope:
  summary: Validate task graph manifests and change plans against active gate index before execution.
  in_scope:
    - src/tool_system/planner/task_graph.py
    - src/tool_system/cli/plan_task_graph.py
    - tests/test_task_graph.py
    - examples/task_manifests/tool_system_task_graph_active_gate.yaml
    - examples/change_plans/tool_system_task_graph_active_gate.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - business-domain logic
    - target repository mutation
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: examples/active_gates.yaml
    why_relevant: Active gate index is the executable manifest and change-plan source of truth.
  - repo: apolo183/tool-system
    path: src/tool_system/runner/active_gate_resolver.py
    why_relevant: Active gate resolver maps task manifests to change plans.
allowed_files:
  - src/tool_system/planner/task_graph.py
  - src/tool_system/cli/plan_task_graph.py
  - tests/test_task_graph.py
  - examples/task_manifests/tool_system_task_graph_active_gate.yaml
  - examples/change_plans/tool_system_task_graph_active_gate.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
