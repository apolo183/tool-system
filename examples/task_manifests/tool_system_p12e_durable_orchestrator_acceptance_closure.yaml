  - repo: apolo183/tool-system
    path: docs/reports/p12d_crash_replay_fixture_evidence.md
    ref: 3a4afb7ac7f3e922e782a12454e71012b880bf59
    why_relevant: Merged crash, reopen, retry, idempotency, and publisher-replay evidence.
  - repo: apolo183/tool-system
    path: src/tool_system/orchestrator/durable.py
    ref: 3a4afb7ac7f3e922e782a12454e71012b880bf59
    why_relevant: Final accepted natural-owner implementation.
  - repo: apolo183/tool-system
    path: tests/test_durable_orchestrator_recovery.py
    ref: 3a4afb7ac7f3e922e782a12454e71012b880bf59
    why_relevant: Final executable recovery and replay evidence.
allowed_files:
