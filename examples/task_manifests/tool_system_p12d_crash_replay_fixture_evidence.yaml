task_id: tool-system-p12d-crash-replay-fixture-evidence
task_type: test_evidence
target_repo: apolo183/tool-system
target_branch: p12d-crash-replay-evidence
phase: P12_DURABLE_ORCHESTRATOR
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P12_DURABLE_ORCHESTRATOR
alignment:
  parent:
    document: docs/reports/p12c_side_effect_ledger_outbox.md
    section_or_key: Stop condition
    scope: Exercise only local crash, reopen, lease, retry, and reconciliation fixtures.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P12_DURABLE_ORCHESTRATOR
    scope: Prove crash resume and non-duplicating reconciliation at the P12 fixture boundary.
scope:
  summary: Add executable crash and replay evidence without changing runtime source.
  in_scope:
    - tests/test_durable_orchestrator_recovery.py
    - docs/reports/p12d_crash_replay_fixture_evidence.md
    - examples/task_manifests/tool_system_p12d_crash_replay_fixture_evidence.yaml
    - examples/change_plans/tool_system_p12d_crash_replay_fixture_evidence.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - durable orchestrator source changes
    - network, provider, or target-repository side effects
    - finance-us mutation
    - production deployment
    - P13-P15 implementation
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p12a_durable_orchestrator_phase_entry.md
    ref: b4180b3022f27922f0189d852858c0167b428348
    why_relevant: Defines the eight required P12D evidence outcomes.
  - repo: apolo183/tool-system
    path: src/tool_system/orchestrator/durable.py
    ref: b4180b3022f27922f0189d852858c0167b428348
    why_relevant: Merged P12B-P12C natural owner exercised without source modification.
allowed_files:
  - tests/test_durable_orchestrator_recovery.py
  - docs/reports/p12d_crash_replay_fixture_evidence.md
  - examples/task_manifests/tool_system_p12d_crash_replay_fixture_evidence.yaml
  - examples/change_plans/tool_system_p12d_crash_replay_fixture_evidence.yaml
  - examples/active_gates.yaml
forbidden_files:
  - src/**
  - policy/**
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m compileall tests/test_durable_orchestrator_recovery.py
    - python -m pytest -q tests/test_durable_orchestrator_recovery.py
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - every P12D fixture scenario passes
    - local idempotent sink application count remains one across crash replay
    - completed effect and published event are not re-executed
    - full tests and active gates pass
    - no runtime source or remote resource is modified
rollback:
  method: git_revert
  reference: p12d-crash-replay-evidence
approval:
  required: true
  approved_by: user_continue_until_next_major_milestone
