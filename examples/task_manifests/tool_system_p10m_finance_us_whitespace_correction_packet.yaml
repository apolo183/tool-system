task_id: tool-system-p10m-finance-us-whitespace-correction-packet
task_type: docs_add
target_repo: apolo183/tool-system
target_branch: p10m-finance-us-whitespace-correction-packet
phase: P10_CONTROLLED_TARGET_REPO_PR_PILOT
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
alignment:
  parent:
    document: docs/reports/p10l_finance_us_local_post_merge_validation.md
    section_or_key: Validation disposition
    scope: Prepare a separately approvable two-file whitespace correction packet without mutating finance-us.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
    scope: Complete accepted P10 closure under explicit downstream mutation and rollback gates.
scope:
  summary: Lock a finance-us two-file whitespace-only correction plan and preserve the P1B entry block.
  in_scope:
    - docs/reports/p10m_finance_us_whitespace_correction_packet.md
    - examples/task_manifests/tool_system_p10m_finance_us_whitespace_correction_packet.yaml
    - examples/change_plans/tool_system_p10m_finance_us_whitespace_correction_packet.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - finance-us branch or file mutation
    - target PR creation, ready transition, or merge
    - P1B entry or implementation
    - rollback execution
    - cleanup execution
    - branch deletion
    - production deployment
    - data, model, ranking, backtest, portfolio, broker, or trading execution
    - real external worker calls
    - Codex replacement claims
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p10l_finance_us_local_post_merge_validation.md
    why_relevant: Records the two trailing-whitespace validation defects and the P1B block.
  - repo: apolo183/finance-us
    path: AGENTS.md
    ref: bfad12148e80c5f712b150851e9374db3a15a80b
    why_relevant: First allowed target file containing the reported trailing whitespace.
  - repo: apolo183/finance-us
    path: README.md
    ref: bfad12148e80c5f712b150851e9374db3a15a80b
    why_relevant: Second allowed target file containing the reported trailing whitespace.
allowed_files:
  - docs/reports/p10m_finance_us_whitespace_correction_packet.md
  - examples/task_manifests/tool_system_p10m_finance_us_whitespace_correction_packet.yaml
  - examples/change_plans/tool_system_p10m_finance_us_whitespace_correction_packet.yaml
  - examples/active_gates.yaml
forbidden_files:
  - src/**
  - tests/**
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m tool_system.cli.validate_alignment_gate examples/active_gates.yaml
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p10m_finance_us_whitespace_correction_packet.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - alignment gate validation returns PASS
    - P10M change plan validation returns PASS
    - active gate index validation returns PASS
    - packet requires separate target execution approval
rollback:
  method: git_revert
  reference: branch commits on p10m-finance-us-whitespace-correction-packet
approval:
  required: true
  approved_by: standing_authorization_for_routine_packet_preparation
