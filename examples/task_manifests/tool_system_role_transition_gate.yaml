task_id: tool-system-role-transition-gate
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p8e-role-transition-gate
phase: P8_MULTI_AGENT_RUNTIME
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P8_MULTI_AGENT_RUNTIME.outputs.role_transition_gate
scope:
  summary: Add a no-mutation role transition gate that evaluates runtime audit bundles and stops at P8 milestone review.
  in_scope:
    - src/tool_system/runtime/transition_gate.py
    - src/tool_system/runtime/audit_bundle.py
    - tests/test_role_transition_gate.py
    - examples/task_manifests/tool_system_role_transition_gate.yaml
    - examples/change_plans/tool_system_role_transition_gate.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - external model API calls
    - Codex replacement claims
    - business-domain logic
    - target repository mutation
    - production deployment
    - cleanup execution
    - milestone closeout
    - role transition execution
evidence:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: P8 requires a role transition gate output.
  - repo: apolo183/tool-system
    path: src/tool_system/runtime/audit_bundle.py
    why_relevant: Role transition gate consumes runtime audit and rollback bundle records.
  - repo: apolo183/tool-system
    path: docs/tool_system_global_development_principles_v1.md
    why_relevant: Claims boundary blocks milestone closure, production readiness, and autonomous target-repo execution claims without evidence.
allowed_files:
  - src/tool_system/runtime/transition_gate.py
  - src/tool_system/runtime/audit_bundle.py
  - tests/test_role_transition_gate.py
  - examples/task_manifests/tool_system_role_transition_gate.yaml
  - examples/change_plans/tool_system_role_transition_gate.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q tests/test_role_transition_gate.py tests/test_runtime_audit_bundle.py tests/test_role_runtime.py tests/test_agent_worker_interface.py
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_role_transition_gate.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - focused pytest exits 0
    - role transition gate change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p8e-role-transition-gate
approval:
  required: true
  approved_by: user_auto_advance_until_milestone_or_required_intervention
