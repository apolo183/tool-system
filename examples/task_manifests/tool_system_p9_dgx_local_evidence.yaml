task_id: tool-system-p9-dgx-local-evidence
task_type: docs_update
target_repo: apolo183/tool-system
target_branch: p9f-dgx-local-evidence
phase: P9_WORKER_ADAPTER_ORCHESTRATION
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P9_WORKER_ADAPTER_ORCHESTRATION
scope:
  summary: Record DGX local validation evidence for P9 strict review.
  in_scope:
    - docs/reports/p9f_dgx_local_validation_evidence.md
    - docs/reports/p9_strict_review_requirements.md
    - examples/task_manifests/tool_system_p9_dgx_local_evidence.yaml
    - examples/change_plans/tool_system_p9_dgx_local_evidence.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - source behavior changes
    - P9 acceptance
    - P9 closure
    - P10 approval
    - rollback execution
    - branch deletion
    - external worker calls
    - downstream write execution
    - production activity
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p9_strict_review_requirements.md
    why_relevant: Defines required DGX local evidence and rollback rehearsal gap.
  - repo: apolo183/tool-system
    path: docs/reports/p9_milestone_review_evidence.md
    why_relevant: Records P9 review state and no-approval boundaries.
allowed_files:
  - docs/reports/p9f_dgx_local_validation_evidence.md
  - docs/reports/p9_strict_review_requirements.md
  - examples/task_manifests/tool_system_p9_dgx_local_evidence.yaml
  - examples/change_plans/tool_system_p9_dgx_local_evidence.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p9_dgx_local_evidence.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - P9 DGX local evidence change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p9f-dgx-local-evidence
approval:
  required: true
  approved_by: user_continue_after_dgx_local_evidence
