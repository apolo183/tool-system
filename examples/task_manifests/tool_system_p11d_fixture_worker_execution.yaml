task_id: tool-system-p11d-fixture-worker-execution
task_type: test_add
target_repo: apolo183/tool-system
target_branch: p11d-fixture-worker-execution
phase: P11_REAL_WORKER_RUNTIME
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P11_REAL_WORKER_RUNTIME
alignment:
  parent:
    document: docs/reports/p11c_isolated_process_worker_implementation.md
    section_or_key: Stop condition
    scope: Run the first real fixture worker only after P11C is merged and preflight passes.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P11_REAL_WORKER_RUNTIME
    scope: Collect fixture-only execution evidence with no remote target or production mutation.
scope:
  summary: Execute and verify the allowlisted P11 fixture worker.
  in_scope:
    - tests/fixtures/p11_worker_fixture.py
    - tests/test_process_worker_runtime_execution.py
    - docs/reports/p11d_fixture_worker_execution_evidence.md
    - examples/task_manifests/tool_system_p11d_fixture_worker_execution.yaml
    - examples/change_plans/tool_system_p11d_fixture_worker_execution.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - runtime source changes
    - finance-us or other remote target mutation
    - remote worker or provider calls
    - production deployment
    - P12-P15 implementation
evidence:
  - repo: apolo183/tool-system
    path: src/tool_system/agent_worker/process_runtime.py
    ref: e1a4d165a406ac834db48edf9fca4550bb3af46a
    why_relevant: Merged minimum safety implementation used by the execution test.
  - repo: apolo183/tool-system
    path: docs/reports/p11c_isolated_process_worker_implementation.md
    ref: e1a4d165a406ac834db48edf9fca4550bb3af46a
    why_relevant: Parent stage explicitly defers first real execution to P11D.
allowed_files:
  - tests/fixtures/p11_worker_fixture.py
  - tests/test_process_worker_runtime_execution.py
  - docs/reports/p11d_fixture_worker_execution_evidence.md
  - examples/task_manifests/tool_system_p11d_fixture_worker_execution.yaml
  - examples/change_plans/tool_system_p11d_fixture_worker_execution.yaml
  - examples/active_gates.yaml
forbidden_files:
  - policy/**
  - src/**
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q tests/test_process_worker_runtime_preflight.py
    - python -m pytest -q tests/test_process_worker_runtime_execution.py
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - preflight-only tests pass before execution
    - fixture execution returns PASS
    - network, child process, and outside-workspace reads block
    - no secrets are inherited
    - ephemeral workspace is deleted
    - full tests and active gates pass
rollback:
  method: git_revert
  reference: p11d-fixture-worker-execution
approval:
  required: true
  approved_by: user_authorized_p11_full_progress_until_p12_boundary
