task_id: tool-system-p9-rollback-rehearsal-evidence
task_type: docs_update
target_repo: apolo183/tool-system
target_branch: p9i-rollback-rehearsal-evidence
phase: P9_WORKER_ADAPTER_ORCHESTRATION
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P9_WORKER_ADAPTER_ORCHESTRATION
scope:
  summary: Record DGX rollback rehearsal evidence for P9 strict review.
  in_scope:
    - docs/reports/p9i_rollback_rehearsal_evidence.md
    - docs/reports/p9_strict_review_requirements.md
    - examples/task_manifests/tool_system_p9_rollback_rehearsal_evidence.yaml
    - examples/change_plans/tool_system_p9_rollback_rehearsal_evidence.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - source behavior changes
    - P9 acceptance
    - P9 closure
    - P10 approval
    - rollback execution
    - branch deletion
    - cleanup execution
    - external worker calls
    - downstream write execution
    - production activity
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p9_strict_review_requirements.md
    why_relevant: Defines rollback rehearsal evidence requirements and P9 acceptance gate.
  - repo: apolo183/tool-system
    path: docs/reports/p9h_documentation_first_control_record.md
    why_relevant: Records documentation-first project inventory and next short stage.
allowed_files:
  - docs/reports/p9i_rollback_rehearsal_evidence.md
  - docs/reports/p9_strict_review_requirements.md
  - examples/task_manifests/tool_system_p9_rollback_rehearsal_evidence.yaml
  - examples/change_plans/tool_system_p9_rollback_rehearsal_evidence.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p9_rollback_rehearsal_evidence.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - P9 rollback rehearsal evidence change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p9i-rollback-rehearsal-evidence
approval:
  required: true
  approved_by: user_auto_iterate_short_stage_until_major_milestone
