task_id: tool-system-p12b-durable-state-foundation
task_type: code_change
target_repo: apolo183/tool-system
target_branch: p12b-durable-state-foundation
phase: P12_DURABLE_ORCHESTRATOR
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P12_DURABLE_ORCHESTRATOR
alignment:
  parent:
    document: docs/reports/p12a_durable_orchestrator_phase_entry.md
    section_or_key: P12B durable state foundation
    scope: Implement only durable run/task state and recovery semantics.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P12_DURABLE_ORCHESTRATOR
    scope: Provide durable state, leases, checkpoints, retries, and crash-resume foundation.
scope:
  summary: Implement the SQLite durable run/task state foundation.
  in_scope:
    - src/tool_system/orchestrator/__init__.py
    - src/tool_system/orchestrator/durable.py
    - tests/test_durable_orchestrator_state.py
    - docs/reports/p12b_durable_state_foundation.md
    - examples/task_manifests/tool_system_p12b_durable_state_foundation.yaml
    - examples/change_plans/tool_system_p12b_durable_state_foundation.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - side-effect ledger or outbox
    - remote or target-repository side effects
    - production deployment
    - P13-P15 implementation
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p12a_durable_orchestrator_phase_entry.md
    ref: 4f6731a473d947084b701d262c1d120dd675c51a
    why_relevant: Merged P12 design and exact P12B scope.
allowed_files:
  - src/tool_system/orchestrator/__init__.py
  - src/tool_system/orchestrator/durable.py
  - tests/test_durable_orchestrator_state.py
  - docs/reports/p12b_durable_state_foundation.md
  - examples/task_manifests/tool_system_p12b_durable_state_foundation.yaml
  - examples/change_plans/tool_system_p12b_durable_state_foundation.yaml
  - examples/active_gates.yaml
forbidden_files:
  - policy/**
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m compileall src/tool_system tests
    - python -m pytest -q tests/test_durable_orchestrator_state.py
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - focused durable-state tests pass
    - full tests pass
    - active gates pass
    - no side effect or target mutation occurs
rollback:
  method: git_revert
  reference: p12b-durable-state-foundation
approval:
  required: true
  approved_by: user_continue_until_next_major_milestone
