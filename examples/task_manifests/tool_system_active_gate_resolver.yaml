task_id: tool-system-active-gate-resolver
task_type: code_add
target_repo: apolo183/tool-system
target_branch: active-gate-resolver
phase: P6_RUNNER_PRODUCTIZATION
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P6_RUNNER_PRODUCTIZATION
scope:
  summary: Resolve omitted change plans from active gate index for single-task and grouped local runs.
  in_scope:
    - src/tool_system/runner/active_gate_resolver.py
    - src/tool_system/runner/task_runner.py
    - src/tool_system/cli/run_task.py
    - src/tool_system/cli/run_batch.py
    - src/tool_system/cli/main.py
    - tests/test_active_gate_resolver.py
    - examples/batches/tool_system_resolved_batch.yaml
    - examples/task_manifests/tool_system_active_gate_resolver.yaml
    - examples/change_plans/tool_system_active_gate_resolver.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - business-domain logic
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: examples/active_gates.yaml
    why_relevant: Active gate index is the source of task-manifest to change-plan resolution.
  - repo: apolo183/tool-system
    path: src/tool_system/runner/task_runner.py
    why_relevant: Task and batch runners consume resolved change plans.
allowed_files:
  - src/tool_system/runner/active_gate_resolver.py
  - src/tool_system/runner/task_runner.py
  - src/tool_system/cli/run_task.py
  - src/tool_system/cli/run_batch.py
  - src/tool_system/cli/main.py
  - tests/test_active_gate_resolver.py
  - examples/batches/tool_system_resolved_batch.yaml
  - examples/task_manifests/tool_system_active_gate_resolver.yaml
  - examples/change_plans/tool_system_active_gate_resolver.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
