task_id: tool-system-p4a-finance-os-probe
task_type: test_add
target_repo: apolo183/tool-system
target_branch: p4a-finance-os-probe
phase: P4_TARGET_REPO_DRY_RUN_ADAPTER
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P4_TARGET_REPO_DRY_RUN_ADAPTER
scope:
  summary: Add a finance-os target repo dry-run probe artifact and regression checks.
  in_scope:
    - examples/target_repo_dry_runs/finance_os_p1b_minimal_ranking.jsonl
    - tests/test_finance_os_dry_run_probe.py
    - examples/task_manifests/tool_system_p4a_finance_os_probe.yaml
    - examples/change_plans/tool_system_p4a_finance_os_probe.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - finance-os writes
    - finance-os implementation changes
    - business-domain logic
    - production deployment
evidence:
  - repo: apolo183/tool-system
    path: AGENTS.md
    why_relevant: P4 permits target repo dry-run validation and forbids finance-os writes.
  - repo: apolo183/tool-system
    path: src/tool_system/target_repo/dry_run_adapter.py
    why_relevant: Adapter emits writes_target_repo false dry-run plans and audit artifacts.
  - repo: apolo183/tool-system
    path: examples/task_manifests/finance_os_p1b_minimal_ranking.yaml
    why_relevant: Existing finance-os target task manifest used by the dry-run probe.
allowed_files:
  - examples/target_repo_dry_runs/finance_os_p1b_minimal_ranking.jsonl
  - tests/test_finance_os_dry_run_probe.py
  - examples/task_manifests/tool_system_p4a_finance_os_probe.yaml
  - examples/change_plans/tool_system_p4a_finance_os_probe.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
  - finance-os/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
