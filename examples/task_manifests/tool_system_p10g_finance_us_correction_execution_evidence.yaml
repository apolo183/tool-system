task_id: tool-system-p10g-finance-us-correction-execution-evidence
task_type: docs_add
target_repo: apolo183/tool-system
target_branch: p10g-finance-us-correction-execution-evidence
phase: P10_CONTROLLED_TARGET_REPO_PR_PILOT
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
alignment:
  parent:
    document: docs/reports/p10f_finance_us_identity_calendar_correction_packet.md
    section_or_key: Execution sequence if separately approved
    scope: Record the approved six-file correction execution and validation evidence without changing finance-us.
  global:
    document: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P10_CONTROLLED_TARGET_REPO_PR_PILOT
    scope: Produce post-pilot evidence and preserve separate target PR merge and milestone acceptance boundaries.
scope:
  summary: Record finance-us P10F correction execution evidence and P1A acceptance readiness.
  in_scope:
    - docs/reports/p10g_finance_us_correction_execution_evidence.md
    - examples/task_manifests/tool_system_p10g_finance_us_correction_execution_evidence.yaml
    - examples/change_plans/tool_system_p10g_finance_us_correction_execution_evidence.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - finance-us branch or file mutation
    - target PR ready transition
    - target PR merge
    - P1A acceptance
    - P1B entry or implementation
    - source or test changes
    - data, model, ranking, evaluation, backtest, portfolio, broker, or production execution
    - rollback execution
    - cleanup execution
    - branch deletion
    - real external worker calls
    - Codex replacement claims
evidence:
  - repo: apolo183/tool-system
    path: docs/reports/p10f_finance_us_identity_calendar_correction_packet.md
    why_relevant: Approved correction packet defining the exact target branch, six-file allowlist, validation, and stop conditions.
  - repo: apolo183/finance-us
    path: README.md
    ref: dbf43976d0b336c0df961a651f35e8b3ceca0255
    why_relevant: Confirms current repository identity is apolo183/finance-us.
  - repo: apolo183/finance-us
    path: blueprint/finance_us_phase_1_v0.yaml
    ref: dbf43976d0b336c0df961a651f35e8b3ceca0255
    why_relevant: Confirms Phase 1 exchanges are NYSE and NASDAQ and calendars are XNYS and XNAS.
  - repo: apolo183/finance-us
    path: contracts/cutoff_contract.yaml
    ref: dbf43976d0b336c0df961a651f35e8b3ceca0255
    why_relevant: Confirms the fail-closed exchange and calendar scope after correction.
allowed_files:
  - docs/reports/p10g_finance_us_correction_execution_evidence.md
  - examples/task_manifests/tool_system_p10g_finance_us_correction_execution_evidence.yaml
  - examples/change_plans/tool_system_p10g_finance_us_correction_execution_evidence.yaml
  - examples/active_gates.yaml
forbidden_files:
  - src/**
  - tests/**
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m tool_system.cli.validate_alignment_gate examples/active_gates.yaml
    - python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p10g_finance_us_correction_execution_evidence.yaml
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - alignment gate validation returns PASS
    - P10G change plan validation returns PASS
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commits on p10g-finance-us-correction-execution-evidence
approval:
  required: true
  approved_by: standing_authorization_for_routine_evidence_stages
