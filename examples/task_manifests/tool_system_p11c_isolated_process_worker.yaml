verification:
  commands:
    - python -m compileall src/tool_system tests
    - python -m pytest -q tests/test_process_worker_runtime_preflight.py
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - preflight tests pass without process execution
    - full tests return PASS
    - active gates return PASS
    - P11D remains the first real execution stage
