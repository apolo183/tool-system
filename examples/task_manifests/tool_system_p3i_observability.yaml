task_id: tool-system-p3i-observability
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p3i-main-ci-observability
phase: P3_REPO_WRITE_CONTROLLER
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P3_REPO_WRITE_CONTROLLER
scope:
  summary: Add post-merge CI observability for merge commits.
  in_scope:
    - src/tool_system/repo_controller/main_ci.py
    - src/tool_system/cli/observe_main_ci.py
    - examples/task_manifests/tool_system_p3i_observability.yaml
    - examples/change_plans/tool_system_p3i_observability.yaml
    - tests/test_main_ci.py
    - examples/active_gates.yaml
    - pyproject.toml
  out_of_scope:
    - finance-os changes
    - business-domain logic
evidence:
  - repo: apolo183/tool-system
    path: .github/workflows/tool-system-ci.yml
    why_relevant: CI observability reports observed status or unavailable workflow run state.
  - repo: apolo183/tool-system
    path: src/tool_system/repo_controller/live_github_collector.py
    why_relevant: Existing commit workflow run collection can be reused for post-merge observation.
allowed_files:
  - src/tool_system/repo_controller/main_ci.py
  - src/tool_system/cli/observe_main_ci.py
  - examples/task_manifests/tool_system_p3i_observability.yaml
  - examples/change_plans/tool_system_p3i_observability.yaml
  - tests/test_main_ci.py
  - examples/active_gates.yaml
  - pyproject.toml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
