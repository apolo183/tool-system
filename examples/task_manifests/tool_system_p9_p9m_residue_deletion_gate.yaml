  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    why_relevant: Active blueprint defining P9 governance and no-mutation boundaries.
allowed_files:
  - docs/reports/p9r_p9m_residue_deletion_gate.md
  - examples/task_manifests/tool_system_p9_p9m_residue_deletion_gate.yaml
  - examples/change_plans/tool_system_p9_p9m_residue_deletion_gate.yaml
  - examples/active_gates.yaml
forbidden_files:
