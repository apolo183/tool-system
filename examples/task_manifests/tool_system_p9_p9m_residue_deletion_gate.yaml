scope:
  summary: Add deletion gate packet for the superseded p9m unique-commit residue branch.
  in_scope:
    - docs/reports/p9r_p9m_residue_deletion_gate.md
    - examples/task_manifests/tool_system_p9_p9m_residue_deletion_gate.yaml
    - examples/change_plans/tool_system_p9_p9m_residue_deletion_gate.yaml
    - examples/active_gates.yaml
