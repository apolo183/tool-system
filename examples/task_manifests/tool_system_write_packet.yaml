task_id: tool-system-write-packet
task_type: code_add
target_repo: apolo183/tool-system
target_branch: iter27
phase: P5_TARGET_REPO_APPROVED_PR_WRITE_FLOW
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P5_TARGET_REPO_APPROVED_PR_WRITE_FLOW
scope:
  summary: Add approved target repository pull-request packet planner.
  in_scope:
    - src/tool_system/target_repo/write_packet.py
    - tests/test_write_packet.py
    - examples/task_manifests/tool_system_write_packet.yaml
    - examples/change_plans/tool_system_write_packet.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - business-domain logic
    - downstream repository execution
evidence:
  - repo: apolo183/tool-system
    path: src/tool_system/target_repo/p4d_precheck.py
    why_relevant: Write packets require a passing precheck.
allowed_files:
  - src/tool_system/target_repo/write_packet.py
  - tests/test_write_packet.py
  - examples/task_manifests/tool_system_write_packet.yaml
  - examples/change_plans/tool_system_write_packet.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
