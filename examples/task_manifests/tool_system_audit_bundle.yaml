task_id: tool-system-audit-bundle
task_type: code_add
target_repo: apolo183/tool-system
target_branch: p5i-audit-bundle
phase: P5_TARGET_REPO_APPROVED_PR_WRITE_FLOW
approved_blueprint_refs:
  - repo: apolo183/tool-system
    path: blueprint/tool_system_v0.yaml
    section_or_key: milestones.P5_TARGET_REPO_APPROVED_PR_WRITE_FLOW
scope:
  summary: Add no-write target repository audit and restore bundle.
  in_scope:
    - src/tool_system/target_repo/p5i_bundle.py
    - tests/test_audit_bundle.py
    - examples/task_manifests/tool_system_audit_bundle.yaml
    - examples/change_plans/tool_system_audit_bundle.yaml
    - examples/active_gates.yaml
  out_of_scope:
    - finance-os writes
    - finance-os implementation changes
    - target repository mutation
    - business-domain logic
evidence:
  - repo: apolo183/tool-system
    path: src/tool_system/target_repo/p5h_record.py
    why_relevant: Audit bundles depend on passing final target repository plan records.
allowed_files:
  - src/tool_system/target_repo/p5i_bundle.py
  - tests/test_audit_bundle.py
  - examples/task_manifests/tool_system_audit_bundle.yaml
  - examples/change_plans/tool_system_audit_bundle.yaml
  - examples/active_gates.yaml
forbidden_files:
  - finance/**
  - trading/**
  - market/**
  - portfolio/**
  - finance-os/**
write_mode: pull_request
verification:
  commands:
    - python -m pytest -q
    - python -m tool_system.cli.validate_active_gates examples/active_gates.yaml
  pass_conditions:
    - pytest exits 0
    - active gate index validation returns PASS
rollback:
  method: git_revert
  reference: branch commit
approval:
  required: true
  approved_by: milestone_authorization
