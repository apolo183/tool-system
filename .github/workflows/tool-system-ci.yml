name: tool-system-ci

on:
  pull_request:
  push:
    branches:
      - main
      - p*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest -q

      - name: Validate finance-os P1B task manifest
        run: python -m tool_system.cli.validate_task_manifest examples/task_manifests/finance_os_p1b_minimal_ranking.yaml

      - name: Validate tool-system P2B task manifest
        run: python -m tool_system.cli.validate_task_manifest examples/task_manifests/tool_system_p2b_runner_foundation.yaml

      - name: Validate P2 change plan
        run: python -m tool_system.cli.validate_change_plan examples/change_plans/tool_system_p2_gate_foundation.yaml

      - name: Execute P2 change plan gate
        run: python -m tool_system.cli.execute_change_plan examples/change_plans/tool_system_p2_gate_foundation.yaml
