schema_version: 0.2
system: tool-system
phase: P3_REPO_WRITE_CONTROLLER
status: active

identity:
  description: Domain-agnostic agentic software factory for blueprint parsing, task planning, patch generation, test execution, and repository control.
  domain_specific: false

boundaries:
  owns:
    - blueprint_parser
    - task_planner
    - harness_engine
    - agent_worker_interface
    - test_gate
    - repo_write_controller
    - audit_log
    - autonomy_policy
  does_not_own:
    - finance_signals
    - ranking_models
    - risk_models
    - execution_orders
    - market_data_contracts

agents:
  planner:
    role: decompose approved blueprints into bounded tasks
    permissions:
      - read_specs
      - propose_task_graph
  coder:
    role: generate patches for approved tasks
    permissions:
      - read_repo
      - propose_patch
  tester:
    role: run verification commands and summarize failures
    permissions:
      - run_tests
      - read_logs
  reviewer:
    role: check patch, spec compliance, and rollback plan
    permissions:
      - read_diff
      - request_changes
  repo_controller:
    role: apply approved repository changes through explicit gates
    permissions:
      - create_branch
      - open_pull_request
      - merge_after_gates

milestones:
  P1_BOOTSTRAP:
    objective: initialize tool-system repository contract and blueprint
    outputs:
      - README.md
      - AGENTS.md
      - blueprint/tool_system_v0.yaml
  P1A_DRY_RUN_GATE:
    objective: validate a future downstream task manifest without writing target repo code
    entry_requires:
      - P1_BOOTSTRAP complete
    outputs:
      - manifest schema
      - policy validator
      - dry-run CLI
  P1B_AUTONOMY_POLICY:
    objective: establish milestone-level automation policy and human review boundaries
    entry_requires:
      - P1A_DRY_RUN_GATE complete
    outputs:
      - updated repo write policy
      - updated agent operating contract
  P2_PATCH_AND_TEST_GATE:
    objective: generate patches and block writes unless tests pass
    entry_requires:
      - P1B_AUTONOMY_POLICY complete
    outputs:
      - patch generator interface
      - test runner
      - spec compliance checker
  P3_REPO_WRITE_CONTROLLER:
    objective: controlled repository modifications through gates
    entry_requires:
      - P2_PATCH_AND_TEST_GATE complete
    outputs:
      - repo write controller
      - rollback log
      - audit trail

default_policy:
  no_direct_main_write: true
  require_blueprint_item_for_change: true
  require_test_gate_for_code_change: true
  require_rollback_plan: true
  business_logic_is_external: true
  per_pr_human_review_required_for_routine_work: false
