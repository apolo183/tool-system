schema_version: 0.2
system: tool-system
phase: P1_AUTONOMY_FOUNDATION
status: active

identity:
  description: Domain-agnostic agentic software factory for blueprint parsing, task planning, patch generation, test execution, and repository control.
  domain_specific: false

boundaries:
  owns:
    - blueprint_parser
    - task_planner
    - harness_engine
    - agent_worker_interface
    - test_gate
    - repo_write_controller
    - audit_log
    - autonomy_policy
  does_not_own:
    - finance_signals
    - ranking_models
    - risk_models
    - execution_orders
    - market_data_contracts

agents:
  planner:
    role: decompose approved blueprints into bounded tasks
    permissions:
      - read_specs
      - propose_task_graph
  coder:
    role: generate patches for approved tasks
    permissions:
      - read_repo
      - propose_patch
  tester:
    role: run verification commands and summarize failures
    permissions:
      - run_tests
      - read_logs
  reviewer:
    role: check patch, spec compliance, and rollback plan
    permissions:
      - approve_or_block_patch

milestones:
  P0_BLUEPRINT_BOOTSTRAP:
    objective: establish repository identity and governance contract
    exit_criteria:
      - README.md exists
      - AGENTS.md exists
      - blueprint/tool_system_v0.yaml exists
  P1A_MINIMAL_DRY_RUN_GATE:
    objective: validate task manifests and repo policy in dry-run mode
    entry_requires:
      - P0_BLUEPRINT_BOOTSTRAP complete
    outputs:
      - task manifest loader
      - repo policy checker
      - validator CLI
      - smoke tests
  P1B_AUTONOMY_POLICY:
    objective: define milestone-level autonomy and avoid per-PR human review for routine implementation work
    entry_requires:
      - P1A_MINIMAL_DRY_RUN_GATE complete
    outputs:
      - policy/autonomy_policy.yaml
      - updated repo write policy
      - updated agent operating contract
  P2_PATCH_AND_TEST_GATE:
    objective: generate patches and block writes unless tests pass
    entry_requires:
      - P1B_AUTONOMY_POLICY complete
    outputs:
      - patch generator interface
      - test runner
      - spec compliance checker
  P3_REPO_WRITE_CONTROLLER:
    objective: controlled repository modifications through gates
    entry_requires:
      - P2_PATCH_AND_TEST_GATE complete
    outputs:
      - repo write controller
      - rollback log
      - audit trail

default_policy:
  no_direct_main_write: true
  require_blueprint_item_for_change: true
  require_test_gate_for_code_change: true
  require_rollback_plan: true
  business_logic_is_external: true
  per_pr_human_review_required_for_routine_work: false
  human_review_required_for_milestone_exit: true
