# repo_rel_path: blueprint/tool_system_v0.yaml
# role: machine-readable phase-0 blueprint
# purpose: define the initial domain-agnostic tool-system contract and milestones
# author: ChatGPT / apolo183
# created_at: 2026-07-05 20:00 UTC+08:00
# updated_at: 2026-07-05 20:00 UTC+08:00

schema_version: 0.1
system: tool-system
phase: P0_BLUEPRINT_BOOTSTRAP
status: bootstrap

identity:
  description: >-
    Domain-agnostic agentic software factory for blueprint parsing, task
    decomposition, patch generation, test execution, review gates, and repository
    write control.
  domain_specific: false
  forbidden_domains:
    - trading_decisions
    - market_data_processing
    - alpha_generation
    - portfolio_allocation
    - investment_advice

boundaries:
  owns:
    - blueprint_parser
    - task_planner
    - harness_engine
    - agent_worker_interface
    - test_gate
    - repo_write_controller
    - audit_log
  does_not_own:
    - finance_signals
    - ranking_models
    - risk_models
    - execution_orders
    - market_data_contracts

agents:
  planner:
    role: decompose approved blueprints into bounded tasks
    permissions:
      - read_specs
      - propose_task_graph
    forbidden:
      - write_repo
      - modify_business_logic
  coder:
    role: generate patches for approved tasks
    permissions:
      - read_repo
      - propose_patch
    forbidden:
      - direct_main_write
      - modify_blueprint_without_approval
  tester:
    role: run verification commands and summarize failures
    permissions:
      - run_tests
      - read_logs
    forbidden:
      - edit_source_to_make_tests_pass
  reviewer:
    role: check patch, spec compliance, and rollback plan
    permissions:
      - approve_or_block_patch
    forbidden:
      - bypass_test_gate

phase_0_allowed_outputs:
  - README.md
  - AGENTS.md
  - blueprint/tool_system_v0.yaml

phase_0_forbidden_outputs:
  - autonomous_patch_loop
  - cross_repo_write_controller
  - production_scheduler
  - finance_domain_modules

milestones:
  P0_BLUEPRINT_BOOTSTRAP:
    objective: establish repository identity and governance contract
    exit_criteria:
      - README.md exists
      - AGENTS.md exists
      - blueprint/tool_system_v0.yaml exists
  P1_MINIMAL_HARNESS:
    objective: implement spec-to-task DAG and dry-run execution
    entry_requires:
      - P0_BLUEPRINT_BOOTSTRAP complete
    outputs:
      - harness DAG model
      - dry-run task planner
      - smoke tests
  P2_PATCH_AND_TEST_GATE:
    objective: generate patches and block writes unless tests pass
    entry_requires:
      - P1_MINIMAL_HARNESS complete
    outputs:
      - patch generator interface
      - test runner
      - spec compliance checker
  P3_REPO_WRITE_CONTROLLER:
    objective: controlled repository modifications through approved gates
    entry_requires:
      - P2_PATCH_AND_TEST_GATE complete
    outputs:
      - repo write controller
      - rollback log
      - audit trail

default_policy:
  no_direct_main_write: true
  require_blueprint_item_for_change: true
  require_test_gate_for_code_change: true
  require_rollback_plan: true
  business_logic_is_external: true
