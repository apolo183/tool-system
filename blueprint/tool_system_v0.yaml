schema_version: 0.5
system: tool-system
phase: P14_BLUEPRINT_TO_CODE_AUTONOMOUS_DEVELOPMENT
status: active
acceptance:
  record: docs/reports/p13e_security_reliability_acceptance_closure.md
  accepted_at: 2026-07-12 UTC+09:00
  accepted_scope: application_guarded_local_fixture_worker_and_single_host_sqlite_hardening
  successor_phase_authorized: true
  prior_acceptance:
    phase: P12_DURABLE_ORCHESTRATOR
    record: docs/reports/p12e_durable_orchestrator_acceptance_closure.md
    accepted_scope: single_host_local_fixture_sqlite_durable_orchestrator
successor_authorization:
  record: docs/reports/p14a_blueprint_to_code_phase_entry_and_contract.md
  authorized_at: 2026-07-12 UTC+09:00
  defined_roadmap:
    - P11_REAL_WORKER_RUNTIME
    - P12_DURABLE_ORCHESTRATOR
    - P13_SECURITY_RELIABILITY_HARDENING
    - P14_BLUEPRINT_TO_CODE_AUTONOMOUS_DEVELOPMENT
    - P15_MULTI_PROJECT_BENCHMARK
    - P16_PRODUCTION_OPERATIONS_ACCEPTANCE
  active_phase: P14_BLUEPRINT_TO_CODE_AUTONOMOUS_DEVELOPMENT
  later_phase_entry_authorized: false
  next_phase: P15_MULTI_PROJECT_BENCHMARK
  next_phase_entry_authorized: false

active_phase_execution:
  record: docs/reports/p14mr_milestone_module_invariant.md
  record_role: existing_acceptance_evidence_only
  durable_rule_owners:
    - "blueprint/tool_system_v0.yaml:milestone_module_invariant"
    - "docs/tool_system_global_development_principles_v1.md:durable_module_and_milestone_discipline"
  current_stage: P14MR_MILESTONE_MODULE_INVARIANT
  phase_entry_authorized: true
  authority_effect: tool_system_local_only
  phase_source_implementation_authorized: false
  next_stage: P14C_BOUNDED_REAL_MODEL_PROVIDER_EXECUTION
  next_stage_authorized: false
  live_model_provider_execution_authorized: false
  remote_target_mutation_authorized: false
  production_deployment_authorized: false

identity:
  description: Domain-agnostic agentic software factory for blueprint parsing, task planning, patch generation, test execution, and repository control.
  domain_specific: false

product_objective:
  id: blueprint_driven_autonomous_software_development
  statement: >-
    Given an approved project blueprint, repository snapshot, authorization
    envelope, acceptance requirements, authorized provider-model portfolio, and
    private economics context, tool-system maps each authorized milestone to a
    controlled change against one durable module or one versioned public
    interface, profiles task complexity, risk, and critical-path impact, selects
    an eligible worker route from benchmark evidence and expected total economic
    cost, decomposes the change into tasks, prepares controlled implementation
    plans, modifies code in an isolated workspace, runs tests, diagnoses and
    repairs failures, reviews blueprint alignment, isolates and replaces failed
    or drifted modules without disturbing unaffected modules, produces auditable
    evidence, and completes a bounded local Git development workflow; an external
    draft pull request is published only under separate action-scoped repository
    authorization.
  required_end_to_end_flow:
    - ingest_approved_blueprint
    - inspect_repository_state
    - build_repository_context
    - decompose_milestones
    - assemble_durable_module_dag_and_milestone_change_bindings
    - validate_module_interfaces_and_dependencies
    - generate_task_dag
    - generate_phase_documents
    - generate_task_manifests
    - generate_change_plans
    - identify_natural_owners
    - profile_task_complexity_risk_and_critical_path
    - resolve_authorized_provider_model_portfolio
    - select_route_by_expected_total_economic_cost
    - invoke_bounded_real_ai_worker
    - execute_bounded_provider_availability_failover
    - execute_bounded_model_quality_escalation
    - implement_code_changes
    - validate_file_scope
    - run_tests
    - diagnose_failures
    - repair_with_bounded_retry
    - review_parent_alignment
    - review_global_product_objective_alignment
    - isolate_and_replace_failed_or_drifted_modules
    - revalidate_affected_module_dependents
    - create_local_git_commits
    - produce_draft_pull_request_plan
    - prepare_separately_authorized_repository_publish_action
    - record_provider_model_outcomes_and_economics
    - produce_acceptance_evidence
    - close_completed_milestones
  completion_definition:
    - approved_blueprint_converts_to_executable_task_graph
    - bounded_projects_complete_end_to_end_in_isolated_repositories
    - real_ai_worker_performs_controlled_implementation_and_repair
    - every_change_traces_to_blueprint_task_and_authorization
    - every_milestone_proves_parent_and_global_objective_alignment
    - every_milestone_identifies_one_durable_module_or_versioned_interface_change
    - interface_compatible_replacement_preserves_unaffected_modules
    - failed_or_drifted_modules_pause_dependents_until_revalidation
    - hidden_cross_module_dependencies_are_rejected
    - interrupted_runs_resume_without_duplicate_side_effects
    - failed_runs_stop_or_rollback_without_silent_scope_expansion
    - isolated_multi_project_fixtures_pass_acceptance
    - remote_side_effects_remain_action_scoped_and_separately_authorized
    - task_profile_and_routing_decisions_are_auditable_and_reproducible
    - provider_unavailability_and_quality_failure_have_distinct_bounded_controls
    - model_selection_uses_task_class_evidence_and_expected_total_economic_cost
    - critical_path_time_and_avoidable_renewal_cost_are_measured
    - safety_quality_data_and_authorization_floors_override_economics
    - credentials_and_private_economic_values_remain_outside_public_repository
  non_goals:
    - unrestricted_remote_repository_mutation
    - autonomous_production_deployment
    - arbitrary_untrusted_code_containment
    - bypassing_human_authorization_boundaries
    - silent_business_requirement_invention
    - claiming_codex_replacement_without_independent_evidence

product_contract:
  inputs:
    - approved_project_blueprint
    - repository_snapshot
    - repository_governance_documents
    - durable_module_contract_and_milestone_change_binding
    - authorization_envelope
    - validation_and_acceptance_requirements
    - authorized_provider_model_portfolio_snapshot
    - task_complexity_risk_and_critical_path_context
    - provider_price_quota_health_and_billing_context
    - private_project_economics_references
  outputs:
    - milestone_hierarchy
    - durable_module_dag_and_milestone_change_bindings
    - module_interface_and_dependency_contracts
    - executable_task_dag
    - phase_entry_records
    - task_manifests
    - change_plans
    - bounded_code_patches
    - test_and_repair_evidence
    - review_and_alignment_evidence
    - local_git_commits
    - draft_pull_request_plan
    - separately_authorized_draft_pull_request
    - acceptance_and_closure_record
    - module_isolation_replacement_and_revalidation_evidence
    - task_complexity_and_risk_profile
    - provider_model_routing_failover_and_escalation_plan
    - provider_model_outcome_and_economic_evidence
    - versioned_provider_model_portfolio_scorecard

milestone_module_invariant:
  id: durable_module_and_milestone_change_boundary
  contract_active: true
  authority_scope:
    repository: tool-system
    governs_other_repositories: false
    may_offer_tools_and_recommendations: true
    may_change_downstream_owner_authority_status_or_write_authorization: false
    immutable_group_reference_effect: pinned_candidate_reference_pending_central_repo_check
    group_reference_created_by_this_change: true
    group_cutover_completed_by_this_change: false
  applies_to:
    - tool_system_durable_modules
    - tool_system_module_interfaces
    - tool_system_module_dependency_boundaries
    - tool_system_milestone_change_bindings
  module_definition:
    persistent_functional_boundary: true
    replaceable: true
    single_responsibility: true
    versioned_public_interface_required: true
  milestone_definition:
    controlled_change_and_acceptance_unit: true
    persistent_module_by_existence: false
    normally_changes_one_module_or_versioned_public_interface: true
  project_architecture:
    module_graph_required: true
    dependency_graph_type: directed_acyclic_graph
    one_active_implementation_per_module: true
    shared_foundations_minimized_and_versioned: true
    hidden_cross_module_dependencies_allowed: false
    direct_internal_state_access_across_modules_allowed: false
  required_module_contract_fields:
    - module_id
    - module_version
    - single_responsibility
    - blueprint_objective_ref
    - natural_owner_paths
    - public_interface_version
    - input_contract
    - output_contract
    - error_semantics
    - externally_visible_side_effects
    - code_boundary
    - data_boundary
    - test_boundary
    - runtime_artifact_boundary
    - cleanup_boundary
    - upstream_dependency_module_ids_and_versions
    - downstream_dependency_module_ids_and_versions
    - content_hashes_and_expected_preconditions
    - authorization_envelope
    - acceptance_evidence
    - rollback_evidence
    - replacement_evidence
  defect_disposition:
    implementation_defect_with_valid_contract: repair_inside_module_boundary_and_reaccept
    contract_or_blueprint_drift: isolate_module_stop_outputs_and_require_accepted_replacement
  failure_isolation:
    failed_or_drifted_module_isolated_from_active_output: true
    dependent_modules_pause_consumption_until_current_revalidation: true
    affected_downstream_dependency_closure_requires_revalidation: true
    unrelated_modules_and_acceptance_remain_valid: true
    hidden_dependency_discovery_expands_explicit_impact_set: true
  compatibility_replacement:
    replacement_module_requires_revalidation: true
    public_upstream_and_downstream_boundaries_require_revalidation: true
    affected_downstream_dependency_closure_requires_revalidation: true
    interface_compatible_replacement_changes_unaffected_modules: false
    unrelated_modules_and_acceptance_remain_valid: true
    direct_dependents_require_reimplementation_by_default: false
    interface_incompatible_change_requires_versioned_migration: true
    global_blueprint_change_requires_impacted_module_replanning: true
    shared_foundation_change_requires_explicit_blast_radius_review: true
  replacement_and_cleanup:
    replacement_must_align_with_parent_and_global_blueprint: true
    replacement_must_pass_before_active_swap: true
    superseded_active_route_removed_after_replacement_acceptance: true
    parallel_active_mainlines_allowed: false
    audit_and_git_history_retained: true
    creator_owned_temporary_cleanup_required: true
    destructive_cleanup_requires_separate_authorization: true
  tooling_boundary:
    may_offer_tools_and_recommendations: true
    downstream_use_requires_downstream_authorization: true
    downstream_governance_authority: false
    may_change_downstream_owner_authority_status_or_write_authorization: false
    external_project_retroactive_mutation_automatic: false
  process_migration_boundary:
    reports_task_manifests_change_plans_active_gates_are_legacy_machine_inputs: true
    process_authority_contract_path: config/process_authority_v1.yaml
    canonical_replay_snapshot_path: config/replay_snapshot_v1.yaml
    repository_manifest_path: REPO_MANIFEST.md
    current_task_authority_mode: explicit_manifest_change_plan_pair
    implicit_legacy_repository_authority_removed: true
    legacy_compatibility_replay_only: true
    legacy_execution_authorized: false
    caller_and_reference_audit_complete: true
    formal_file_set_registration_implemented: true
    tracked_path_coverage_validation_implemented: true
    legacy_non_authority_sets_registered: true
    group_process_file_compliance_claimed: false
    deletion_or_reclassification_authorized: false
  enforcement:
    current_contract_scope: local_registry_structure_declared_dag_natural_owners_and_alignment_tests
    module_registry_path: config/module_registry_v1.yaml
    module_registry_schema_path: config/module_registry_schema_v1.json
    module_registry_structural_validation_implemented: true
    declared_dependency_dag_validation_implemented: true
    natural_owner_overlap_validation_implemented: true
    source_ownership_coverage_validation_implemented: true
    source_import_edge_enforcement_implemented: false
    runtime_module_enforcement_implemented: false
    machine_alignment_tests_required: true
    module_graph_validation_required: true
    interface_compatibility_evidence_required: true
    fault_isolation_blast_radius_record_required: true
    blueprint_compiler_owner: P14E_BLUEPRINT_COMPILER
    multi_project_acceptance_owner: P15_MULTI_PROJECT_BENCHMARK

global_alignment:
  required_for_every_milestone: true
  required_for_every_task_manifest: true
  required_for_every_change_plan: true
  required_for_every_acceptance_record: true
  require_direct_parent_alignment: true
  require_global_product_objective_alignment: true
  product_objective_ref: product_objective
  fail_closed_on_missing_alignment: true

boundaries:
  owns:
    - blueprint_parser
    - task_planner
    - task_graph_planner
    - multi_agent_runtime
    - worker_adapter_orchestration
    - harness_engine
    - agent_worker_interface
    - test_gate
    - repo_write_controller
    - audit_log
    - autonomy_policy
    - target_repo_dry_run_adapter
    - target_repo_pr_write_flow
    - agent_role_taxonomy
    - task_runner_productization
    - controlled_target_repo_pr_pilot
    - real_worker_runtime
    - durable_orchestrator
    - security_reliability_hardening
    - blueprint_to_code_autonomous_development
    - durable_module_and_milestone_change_governance
    - adaptive_provider_model_routing
    - task_complexity_and_risk_profiling
    - provider_model_portfolio_lifecycle
    - development_time_and_economic_cost_optimization
    - multi_project_benchmark
    - production_operations_acceptance
  does_not_own:
    - finance_signals
    - ranking_models
    - risk_models
    - execution_orders
    - market_data_contracts

agents:
  request_intake:
    group: intake
    role: normalize user requests, classify scope, and detect milestone or policy boundaries
    permissions:
      - read_user_request
      - classify_scope
      - request_missing_context
  evidence_collector:
    group: evidence
    role: collect repo files, logs, PRs, CI state, and target contract references before action
    permissions:
      - read_repo
      - read_pr_state
      - read_ci_state
      - read_target_contract_refs
  blueprint_architect:
    group: architecture
    role: maintain blueprint, objective contracts, role taxonomy, and anti-drift boundaries
    permissions:
      - propose_blueprint_change
      - update_contract_docs
  task_complexity_assessor:
    group: planning
    role: produce an advisory structured profile of task complexity, independent risk, required capabilities, verification burden, and critical-path impact
    permissions:
      - assess_task_complexity
      - assess_task_risk
      - identify_critical_path_context
      - propose_provider_model_capability_floor
  model_portfolio_analyst:
    group: optimization
    role: compare task-class benchmark, reliability, availability, time, and economic evidence and propose versioned portfolio changes
    permissions:
      - read_redacted_provider_model_evidence
      - propose_task_class_route_scores
      - propose_provider_model_promotion_or_demotion
      - propose_portfolio_recalculation
  task_decomposer:
    group: planning
    role: split approved objectives into bounded tasks with explicit inputs and outputs
    permissions:
      - propose_task_manifest
      - propose_task_graph
  dag_planner:
    group: planning
    role: order bounded tasks into a dependency graph with gates and rollback nodes
    permissions:
      - propose_dag
      - assign_role_nodes
  policy_guard:
    group: policy
    role: enforce no-go boundaries, approval requirements, and business-domain separation
    permissions:
      - evaluate_policy
      - block_disallowed_actions
  change_planner:
    group: implementation
    role: produce file-scoped change plans with validation commands and rollback references
    permissions:
      - propose_change_plan
      - validate_change_scope
  patch_author:
    group: implementation
    role: modify approved files only after evidence and change-plan gates
    permissions:
      - read_repo
      - propose_patch
      - write_approved_branch
  test_engineer:
    group: verification
    role: define and run tests, compile checks, and contract validations
    permissions:
      - run_tests
      - read_logs
  ci_operator:
    group: verification
    role: collect GitHub Actions state, jobs, steps, and failure evidence
    permissions:
      - read_ci_state
      - read_ci_logs
  code_reviewer:
    group: review
    role: review diffs for implementation, imports, behavior, and regression risk
    permissions:
      - read_diff
      - request_changes
  contract_reviewer:
    group: review
    role: review blueprint, manifests, policies, active gates, and rollback records
    permissions:
      - read_contracts
      - request_contract_changes
  repo_controller:
    group: repository
    role: create branches, open pull requests, and merge after gates pass
    permissions:
      - create_branch
      - open_pull_request
      - merge_after_gates
  target_repo_adapter:
    group: target
    role: prepare target repo dry-runs, write packets, execution gates, and command previews
    permissions:
      - read_target_contract_refs
      - produce_dry_run_plan
      - produce_pr_write_plan
      - write_tool_system_audit
  target_repo_executor:
    group: target
    role: execute approved target repository branch, file, and PR mutations after separate execution approval
    permissions:
      - execute_target_branch_write_after_approval
      - execute_target_file_write_after_approval
      - execute_target_pr_open_after_approval
  audit_recorder:
    group: audit
    role: write audit records, rollback references, and milestone evidence summaries
    permissions:
      - write_audit_record
      - record_rollback_reference
  cleanup_owner:
    group: cleanup
    role: identify and remove temporary branches, probes, stale refs, and residual artifacts after evidence
    permissions:
      - inspect_residue
      - propose_cleanup
      - delete_approved_residue

role_control_rules:
  no_single_role_may_approve_and_execute_target_mutation: true
  target_mutation_requires_fresh_state: true
  target_mutation_requires_execution_approval: true
  production_deployment_requires_execution_approval: true
  business_domain_roles_forbidden_in_tool_system: true
  dag_must_include_evidence_policy_verification_and_audit_nodes: true
  task_complexity_assessment_is_advisory_only: true
  provider_model_route_decision_is_deterministic_policy_owned: true
  risk_and_authorization_floors_cannot_be_downgraded_for_cost: true
  provider_availability_failover_must_remain_authorized_and_bounded: true
  quality_failure_escalation_must_be_bounded_and_evidence_backed: true
  policy_data_budget_or_precondition_failure_never_triggers_provider_bypass: true
  public_repository_stores_credential_references_only: true
  private_economic_values_must_not_be_committed: true
  critical_path_time_is_primary_soft_optimization_metric: true
  safety_quality_data_and_authorization_constraints_override_economics: true

milestones:
  P1_BOOTSTRAP:
    objective: initialize tool-system repository contract and blueprint
    outputs:
      - README.md
      - AGENTS.md
      - blueprint/tool_system_v0.yaml
  P1A_DRY_RUN_GATE:
    objective: validate a future downstream task manifest without writing target repo code
    entry_requires:
      - P1_BOOTSTRAP complete
    outputs:
      - manifest schema
      - policy validator
      - dry-run CLI
  P1B_AUTONOMY_POLICY:
    objective: establish milestone-level automation policy and human review boundaries
    entry_requires:
      - P1A_DRY_RUN_GATE complete
    outputs:
      - updated repo write policy
      - updated agent operating contract
  P2_PATCH_AND_TEST_GATE:
    objective: generate patches and block writes unless tests pass
    entry_requires:
      - P1B_AUTONOMY_POLICY complete
    outputs:
      - patch generator interface
      - test runner
      - spec compliance checker
  P3_REPO_WRITE_CONTROLLER:
    objective: controlled repository modifications through gates
    entry_requires:
      - P2_PATCH_AND_TEST_GATE complete
    outputs:
      - repo write controller
      - rollback log
      - audit trail
  P4_TARGET_REPO_DRY_RUN_ADAPTER:
    objective: validate downstream target repo tasks and emit no-write dry-run plans
    entry_requires:
      - P3_REPO_WRITE_CONTROLLER foundation accepted
    outputs:
      - target repo manifest boundary validator
      - no-write dry-run plan
      - target adapter audit artifact
  P5_TARGET_REPO_APPROVED_PR_WRITE_FLOW:
    objective: prepare approved downstream target repo pull-request write flow after P4 gates pass
    entry_requires:
      - P4_TARGET_REPO_DRY_RUN_ADAPTER accepted
    outputs:
      - approved target repo PR write planner
      - target repo branch and PR mutation gate
      - target repo write audit and rollback reference
      - fine-grained agent role taxonomy
  P6_RUNNER_PRODUCTIZATION:
    objective: provide a single local runner command for task manifest and change-plan validation, gate execution, and audit record creation
    entry_requires:
      - P5_TARGET_REPO_APPROVED_PR_WRITE_FLOW accepted
    outputs:
      - unified task runner API
      - tool-system-run CLI
      - grouped local checks CLI
      - local audit artifact
      - no-mutation runner contract
  P7_BLUEPRINT_TO_TASK_GRAPH:
    objective: transform approved blueprint or requirement work into a validated dependency graph of bounded tasks with role assignments and control gates
    entry_requires:
      - P6_RUNNER_PRODUCTIZATION accepted
    outputs:
      - task graph planner API
      - task graph planner CLI
      - dependency ordering
      - agent role assignment validation
      - evidence policy verification audit node coverage
  P8_MULTI_AGENT_RUNTIME:
    objective: run validated task graphs through a no-mutation role-assigned runtime with evidence, verification, review, repository-control, audit, and rollback records
    entry_requires:
      - P7_BLUEPRINT_TO_TASK_GRAPH accepted
    outputs:
      - role step runtime contract
      - no-mutation role execution records
      - runtime audit bundle
      - role transition gate
      - rollback reference bundle
  P9_WORKER_ADAPTER_ORCHESTRATION:
    objective: define and validate no-mutation worker adapter contracts and orchestration records for local or dry-run worker runs while preserving target-repository and production boundaries
    entry_requires:
      - P8_MULTI_AGENT_RUNTIME accepted
      - downstream target-repository mutation remains separately approved only
      - production deployment remains separately approved only
    outputs:
      - worker adapter contract
      - local dry-run adapter harness
      - adapter policy gate
      - adapter evidence record
      - orchestration audit record
      - rollback reference bundle
  P10_CONTROLLED_TARGET_REPO_PR_PILOT:
    objective: operate a controlled target-repository pull-request pilot boundary after P9 acceptance while keeping every real downstream write behind separate execution approval
    entry_requires:
      - P9_WORKER_ADAPTER_ORCHESTRATION accepted
      - target-repository mutation remains separately approved per named execution packet
      - production deployment remains separately approved only
      - business-domain logic remains outside tool-system
    outputs:
      - P10 phase-entry record
      - target-repo selection gate
      - target-repo execution approval packet
      - controlled no-production PR pilot plan
      - target-repo write audit and rollback reference
      - post-pilot evidence bundle
  P11_REAL_WORKER_RUNTIME:
    objective: execute a real local process-backed worker in an isolated fixture workspace with a fail-closed minimum safety baseline and no downstream target-repository or production mutation
    entry_requires:
      - P10_CONTROLLED_TARGET_REPO_PR_PILOT accepted and P10R corrective lifecycle closed
      - explicit P11 phase-entry authorization
      - minimum safety controls pass before the first real worker execution
      - finance-us and every other remote target repository remain no-mutation
      - production deployment remains separately approved only
    outputs:
      - real worker request and result contract
      - ephemeral isolated fixture workspace
      - executable and input allowlists
      - scrubbed environment and secret controls
      - cwd, path traversal, and symlink controls
      - network-disabled worker policy with fail-closed enforcement
      - CPU, memory, process, file, runtime, and output limits
      - cancellation and process-group termination
      - fixture-only real worker execution evidence
      - P11 acceptance and rollback evidence
  P12_DURABLE_ORCHESTRATOR:
    objective: persist orchestration state and resume safely without duplicating external side effects
    entry_requires:
      - P11_REAL_WORKER_RUNTIME accepted
      - explicit P12 phase-entry authorization
    outputs:
      - durable run and task state
      - leases, checkpoints, retry, and crash resume
      - idempotency keys and attempt numbers
      - external side-effect ledger and completed-side-effect markers
      - transactional outbox and reconciliation loop
      - expected precondition SHA enforcement
  P13_SECURITY_RELIABILITY_HARDENING:
    objective: harden the P11-P12 runtime and orchestrator through adversarial tests, fault injection, and stronger isolation controls
    entry_requires:
      - P12_DURABLE_ORCHESTRATOR accepted
      - explicit P13 phase-entry authorization
    outputs:
      - threat model and abuse cases
      - sandbox and secret-control hardening
      - adversarial path, executable, environment, and network tests
      - fault injection and recovery evidence
      - resource exhaustion and cancellation stress evidence
      - security and reliability acceptance record
  P14_BLUEPRINT_TO_CODE_AUTONOMOUS_DEVELOPMENT:
    objective: complete the bounded blueprint-to-code autonomous development loop before benchmarking the product across projects
    entry_requires:
      - P13_SECURITY_RELIABILITY_HARDENING accepted
      - explicit P14 phase-entry authorization
      - implementation begins in isolated local fixture repositories only
    outputs:
      - end-to-end product and acceptance contract
      - durable versioned module graph, interfaces, and milestone change bindings
      - bounded real AI model-provider worker runtime
      - provider-neutral worker interface and one separately authorized bounded provider proof
      - repository context builder and natural-owner discovery
      - blueprint-to-milestone and executable task-DAG compiler
      - autonomous patch-test-diagnose-repair-review loop
      - bounded retries, no-progress detection, checkpoint, resume, and rollback
      - isolated local Git branch, commit, conflict, and draft-PR-plan workflow
      - multi-stack end-to-end fixture-project acceptance evidence
      - blueprint-to-code autonomous development acceptance record
    stage_plan:
      - stage: P14A_PHASE_ENTRY_END_TO_END_SPECIFICATION
        objective: lock the product contract, capability gaps, stages, owners, fixtures, claims, and authorization boundaries
        entry_requires:
          - P14 phase-entry authorization
        execution_boundary: governance_only
      - stage: P14B_PROVIDER_NEUTRAL_AI_WORKER_CONTRACT
        objective: implement structured AI request/result, resource controls, error taxonomy, replay safety, and a deterministic fixture provider
        entry_requires:
          - P14A_PHASE_ENTRY_END_TO_END_SPECIFICATION accepted
          - explicit P14B source-implementation authorization
        execution_boundary: no_live_provider
      - stage: P14MR_MILESTONE_MODULE_INVARIANT
        objective: reconcile tool-system milestone planning with durable replaceable capability modules without treating milestone packets as modules or governing downstream repositories
        entry_requires:
          - P14B_PROVIDER_NEUTRAL_AI_WORKER_CONTRACT accepted
          - explicit tool-system-local durable-module governance authorization
        execution_boundary: governance_only
        authority_effect: tool_system_local_only
        durable_rule_owners:
          - milestone_module_invariant
          - docs/tool_system_global_development_principles_v1.md
      - stage: P14C_BOUNDED_REAL_MODEL_PROVIDER_EXECUTION
        objective: prove one bounded real provider path with cost, secret, network, timeout, cancellation, retry, validation, and audit controls
        entry_requires:
          - P14B_PROVIDER_NEUTRAL_AI_WORKER_CONTRACT accepted
          - P14MR_MILESTONE_MODULE_INVARIANT accepted
          - named provider-model-network-credential-cost execution packet authorized
        execution_boundary: separately_authorized_live_provider_no_repository_mutation
      - stage: P14D_REPOSITORY_CONTEXT_NATURAL_OWNER
        objective: build bounded repository context, relevance selection, dependency and test mapping, natural-owner evidence, and stale-snapshot checks
        entry_requires:
          - P14C_BOUNDED_REAL_MODEL_PROVIDER_EXECUTION accepted
        execution_boundary: isolated_fixture_repositories
      - stage: P14E_BLUEPRINT_COMPILER
        objective: derive durable versioned modules, milestone-to-module change bindings, interfaces, dependency DAGs, stages, tasks, documents, manifests, plans, gates, tests, isolation paths, replacements, and rollback nodes from approved inputs
        entry_requires:
          - P14D_REPOSITORY_CONTEXT_NATURAL_OWNER accepted
        execution_boundary: isolated_fixture_repositories
      - stage: P14F_AUTONOMOUS_PATCH_TEST_REPAIR_REVIEW
        objective: implement structured patching, verification, diagnosis, bounded repair, no-progress detection, and independent review
        entry_requires:
          - P14E_BLUEPRINT_COMPILER accepted
        execution_boundary: isolated_fixture_repositories
      - stage: P14G_DURABLE_LOCAL_GIT_ORCHESTRATION
        objective: integrate durable state, resume, side-effect markers, local branches, commits, conflicts, rollback, and cleanup
        entry_requires:
          - P14F_AUTONOMOUS_PATCH_TEST_REPAIR_REVIEW accepted
        execution_boundary: isolated_local_git_only
      - stage: P14H_MULTI_STACK_END_TO_END_FIXTURE_ACCEPTANCE
        objective: prove successful, blocked, repaired, resumed, rolled-back, and deterministic blueprint-to-code scenarios across fixture stacks
        entry_requires:
          - P14G_DURABLE_LOCAL_GIT_ORCHESTRATION accepted
        execution_boundary: isolated_fixture_repositories
      - stage: P14I_ACCEPTANCE_CLOSURE
        objective: accept the bounded blueprint-to-code product and stop at P15 authorization
        entry_requires:
          - P14H_MULTI_STACK_END_TO_END_FIXTURE_ACCEPTANCE accepted
        execution_boundary: governance_only
    required_acceptance_fixtures:
      - greenfield_python_cli
      - existing_python_library_natural_owner_change
      - typescript_package_language_neutral_flow
      - bounded_failing_test_repair
      - ambiguous_blueprint_pre_mutation_block
      - out_of_scope_patch_block_and_rollback
      - timeout_cancellation_cleanup_and_resume
      - completed_side_effect_crash_without_duplicate_replay
      - local_git_conflict_policy
      - deterministic_content_addressed_replay
    accepted_claim: >-
      Given an approved bounded blueprint and isolated repository fixture,
      tool-system can autonomously plan durable versioned replaceable modules and
      milestone change bindings, implement, test, repair, review, isolate failed
      or drifted modules, and record a local Git software change through an
      auditable, resumable, fail-closed workflow.
  P15_MULTI_PROJECT_BENCHMARK:
    objective: qualify and benchmark the accepted blueprint-to-code product and adaptive provider-model portfolio across task classes, multiple isolated projects, and read-only real repositories before any optional target pilot
    entry_requires:
      - P14_BLUEPRINT_TO_CODE_AUTONOMOUS_DEVELOPMENT accepted
      - explicit P15 phase-entry authorization
      - each live provider benchmark has a named provider-model-network-credential-reference-limit execution packet
      - each real repository mutation separately authorized
      - each benchmark project supplies its own explicitly authorized durable-module contract
    outputs:
      - representative multi-project benchmark suite
      - replaceable provider adapters qualified by execution surface and task class
      - advisory task complexity, independent risk, and critical-path profiles
      - deterministic policy-owned routing decisions and hard capability floors
      - versioned exact-model catalog with dated price, quota, data-policy, health, and benchmark evidence
      - quality, time-to-acceptance, expected total economic cost, recovery, and policy metrics
      - distinct bounded availability-failover, quality-repair, and model-escalation evidence
      - cross-project isolation and generalization evidence
      - real-repository read-only benchmark evidence
      - failed-case and rollback corpus
      - optional separately authorized controlled target pilot
      - release-candidate acceptance review
    stage_plan:
      - stage: P15A_PROVIDER_PORTFOLIO_QUALIFICATION_SPECIFICATION
        objective: lock provider interfaces, task profiles, hard floors, economics, benchmark corpus, credentials, evidence, and authorization boundaries
        execution_boundary: governance_only
      - stage: P15B_ADAPTER_ROUTER_AND_PROFILER_FIXTURES
        objective: implement provider-neutral adapter, task-profile, deterministic-routing, catalog, and failure-classification fixtures
        entry_requires:
          - P15A_PROVIDER_PORTFOLIO_QUALIFICATION_SPECIFICATION accepted
        execution_boundary: isolated_fixture_no_live_provider
      - stage: P15C_CROSS_PROVIDER_READ_ONLY_BENCHMARK
        objective: run separately authorized provider-model candidates against deterministic fixtures and read-only real repositories without target mutation
        entry_requires:
          - P15B_ADAPTER_ROUTER_AND_PROFILER_FIXTURES accepted
          - named execution packet for every live provider surface
        execution_boundary: separately_authorized_live_provider_read_only_repositories
      - stage: P15D_FAILURE_ROLLBACK_ISOLATION_AND_ECONOMICS_CORPUS
        objective: prove bounded failover, repair, escalation, cancellation, no-progress, isolation, rollback, and total-economic-cost decisions
        entry_requires:
          - P15C_CROSS_PROVIDER_READ_ONLY_BENCHMARK accepted
        execution_boundary: isolated_fixture_and_read_only_evidence
      - stage: P15E_OPTIONAL_CONTROLLED_TARGET_MUTATION_PILOT
        objective: optionally validate one named route against one separately authorized target change without granting general target authority
        entry_requires:
          - P15D_FAILURE_ROLLBACK_ISOLATION_AND_ECONOMICS_CORPUS accepted
          - named action-scoped target execution approval
        execution_boundary: separately_authorized_optional_target_mutation
      - stage: P15F_BENCHMARK_ACCEPTANCE_CLOSURE
        objective: accept or reject the release candidate and stop at P16 authorization
        entry_requires:
          - P15D_FAILURE_ROLLBACK_ISOLATION_AND_ECONOMICS_CORPUS accepted
          - optional P15E pilot execution or explicit omission decision is recorded
        execution_boundary: governance_only
  P16_PRODUCTION_OPERATIONS_ACCEPTANCE:
    objective: establish sustainable production operations and decide production acceptance without silently granting deployment authority
    entry_requires:
      - P15_MULTI_PROJECT_BENCHMARK accepted
      - explicit P16 phase-entry authorization
      - production deployment remains separately approved only
    outputs:
      - release and version policy
      - schema and state migration strategy
      - upgrade, downgrade, backup, restore, and disaster recovery evidence
      - observability SLOs, alerting, and incident response
      - audit and run retention policy
      - event-driven provider-model release, deprecation, price, policy, quota, and health refresh
      - daily lightweight availability, critical-path, and economic recomputation
      - changed-model incremental benchmark at a default 72-hour cadence
      - weekly task-class portfolio review and promotion-demotion decisions
      - monthly and pre-renewal subscription and completion-forecast review
      - exact-version model lifecycle from discovery and quarantine through retirement
      - versioned atomic portfolio publication and rollback
      - total-economic-cost, quota, concentration-risk, and provider-outage controls
      - operator runbook and deprecation policy
      - production acceptance decision record

default_policy:
  no_direct_main_write: true
  require_blueprint_item_for_change: true
  require_test_gate_for_code_change: true
  require_rollback_plan: true
  business_logic_is_external: true
  per_pr_human_review_required_for_routine_work: false
  target_repo_writes_require_separate_approval: true
  production_deployment_requires_separate_approval: true
