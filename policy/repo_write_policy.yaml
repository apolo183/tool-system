schema_version: 0.3
policy: repo_write_policy
status: active
approved_by: milestone_authorization
approved_at: 2026-07-06 01:25 UTC+08:00

defaults:
  direct_main_write: false
  require_task_manifest: true
  require_blueprint_reference: true
  require_evidence_block: true
  require_verification_plan: true
  require_rollback_plan: true
  prefer_pull_request: true

approval_model:
  level: milestone_authorization
  per_task_human_review_required: false
  per_pr_human_review_required: false
  human_review_required_for:
    - blueprint_change
    - objective_change
    - milestone_acceptance
    - policy_boundary_change

allowed_target_repos:
  apolo183/tool-system:
    role: domain_agnostic_tooling_repo
    default_write_mode: pull_request
    bootstrap_direct_main_allowed: false
    allowed_paths_by_mode:
      read_only:
        - "**"
      patch_only:
        - "**"
      pull_request:
        - src/tool_system/**
        - tests/**
        - examples/**
        - docs/**
        - pyproject.toml
        - .gitignore
        - policy/**
        - blueprint/**
        - harness/**
        - README.md
        - AGENTS.md
        - .github/workflows/**
      direct_bootstrap:
        - README.md
        - AGENTS.md
        - blueprint/**
        - policy/**
        - harness/**
    lifecycle_approval:
      pr_merge: manifest
    forbidden_paths:
      - finance/**
      - trading/**
      - market/**
      - portfolio/**
  apolo183/finance-us:
    role: quantitative_finance_business_repo
    default_write_mode: pull_request
    bootstrap_direct_main_allowed: false
    allowed_paths_by_mode:
      read_only:
        - "**"
      patch_only:
        - "**"
      pull_request:
        - finance_us/**
        - tests/**
        - contracts/**
        - blueprint/**
        - pyproject.toml
        - README.md
        - AGENTS.md
      direct_bootstrap:
        - README.md
        - AGENTS.md
        - blueprint/**
        - contracts/**
    lifecycle_approval:
      pr_merge: named_action
    forbidden_paths:
      - harness/**
      - agents/**
      - repo_controller/**
      - broker/**
      - live_runtime/**
  apolo183/finance-os:
    status: retired
    role: retired_quantitative_finance_fixture
    default_write_mode: patch_only
    bootstrap_direct_main_allowed: false
    historical_fixture:
      allowed_task_ids:
        - finance-os-p1b-minimal-ranking
      allowed_modes:
        - patch_only
    allowed_paths_by_mode:
      read_only:
        - "**"
      patch_only:
        - src/finance_os/**
        - tests/**
        - contracts/**
        - blueprint/**
        - pyproject.toml
        - README.md
        - AGENTS.md
      pull_request: []
      direct_bootstrap: []
    lifecycle_approval: {}
    forbidden_paths:
      - harness/**
      - agents/**
      - repo_controller/**
      - broker/**
      - live_runtime/**

write_modes:
  read_only:
    writes_repo: false
    requires_ci: false
  patch_only:
    writes_repo: false
    requires_ci: false
  pull_request:
    writes_repo: true
    requires_ci: true
    requires_review_gate: true
  direct_bootstrap:
    writes_repo: true
    allowed_only_when:
      - repo_bootstrap_or_contract_hardening
      - files_match_bootstrap_allowlist

hard_blocks:
  - missing_task_manifest
  - missing_blueprint_reference
  - missing_evidence_block
  - missing_rollback_plan
  - unapproved_target_repo
  - path_outside_allowlist
  - tool_repo_contains_business_logic
  - business_repo_contains_harness_logic
  - required_verification_failed
  - inactive_policy
  - direct_bootstrap_disabled
  - missing_or_mismatched_lifecycle_approval

merge_policy:
  default_method: squash
  system_merge_allowed_after_gates_pass: true
  human_review_required_before_regular_merge: false
  human_review_required_for_milestone_exit: true

rollback:
  minimum_required_reference:
    - commit_sha
    - changed_file_list
  accepted_methods:
    - git_revert
    - patch_reverse
    - close_unmerged_pr
